<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#f8fafc">ตัวอย่างคำนวณ VAT: รายได้ 200,000 บาท/เดือน</text>
  <g font-family="system-ui,sans-serif">
    <rect x="50" y="45" width="320" height="300" rx="10" fill="#1e293b"/>
    <text x="210" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">ภาษีขาย (Output VAT)</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="70" y="110">ค่าบริการ: 200,000</text>
      <text x="70" y="140">VAT 7%: <tspan fill="#ef4444" font-weight="bold">14,000</tspan></text>
      <text x="70" y="170">ออก invoice: 214,000</text>
      <text x="70" y="210" fill="#94a3b8">ลูกค้าจ่าย 214,000 บาท</text>
      <text x="70" y="240" fill="#94a3b8">แต่ 14,000 ไม่ใช่ของคุณ</text>
      <text x="70" y="270" fill="#94a3b8">ต้องนำส่งสรรพากร</text>
    </g>
    <rect x="430" y="45" width="320" height="300" rx="10" fill="#1e293b"/>
    <text x="590" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#34d399">ภาษีซื้อ (Input VAT)</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="450" y="110">ค่า software: 5,000 (VAT 350)</text>
      <text x="450" y="140">ค่า co-working: 4,280 (VAT 280)</text>
      <text x="450" y="170">ค่าอุปกรณ์: 10,000 (VAT 654)</text>
      <text x="450" y="210" fill="#34d399" font-weight="bold">รวมภาษีซื้อ: 1,284</text>
      <text x="450" y="250" fill="#94a3b8">ภาษีซื้อนำไปหักได้</text>
    </g>
    <rect x="50" y="355" width="700" height="35" rx="6" fill="#064e3b"/>
    <text x="400" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">จ่ายสรรพากร = 14,000 - 1,284 = 12,716 บาท/เดือน</text>
  </g>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">finlance.co</text>
</svg>