  <text x="695" y="79" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">เริ่มอายุ 40</text>
  <rect x="30" y="98" width="740" height="38" rx="4" fill="#064e3b" opacity="0.3"/>
  <text x="115" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">5 ล้านบาท</text>
  <text x="280" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">3,500 บาท/เดือน</text>
  <text x="420" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">5,500 บาท/เดือน</text>
  <text x="560" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">9,000 บาท/เดือน</text>
  <text x="695" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">16,000 บาท/เดือน</text>
  <rect x="30" y="141" width="740" height="38" rx="4" fill="#1e3a5f" opacity="0.3"/>
  <text x="115" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">10 ล้านบาท</text>
  <text x="280" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">7,000 บาท/เดือน</text>
  <text x="420" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">11,000 บาท/เดือน</text>
  <text x="560" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">18,000 บาท/เดือน</text>
  <text x="695" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">32,000 บาท/เดือน</text>
  <rect x="30" y="184" width="740" height="38" rx="4" fill="#064e3b" opacity="0.3"/>
  <text x="115" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">15 ล้านบาท</text>
  <text x="280" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">10,500 บาท/เดือน</text>
  <text x="420" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">16,500 บาท/เดือน</text>
  <text x="560" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">27,000 บาท/เดือน</text>
  <text x="695" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">48,000 บาท/เดือน</text>
  <rect x="30" y="227" width="740" height="38" rx="4" fill="#1e3a5f" opacity="0.3"/>
  <text x="115" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">20 ล้านบาท</text>
  <text x="280" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">14,000 บาท/เดือน</text>
  <text x="420" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">22,000 บาท/เดือน</text>
  <text x="560" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">36,000 บาท/เดือน</text>
  <text x="695" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">64,000 บาท/เดือน</text>
  <rect x="30" y="295" width="740" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="320" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">สูตรประมาณการง่าย</text>
  <text x="400" y="345" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">เงินออม/เดือน = เป้าหมาย ÷ (ปีที่เหลือ × 12) × ปรับ compound factor</text>
  <text x="400" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">เริ่มเร็ว = ออมน้อยกว่า | เริ่มช้า = ต้องออมมากขึ้นหลายเท่า</text>
</svg>
