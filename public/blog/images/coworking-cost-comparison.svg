<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">ต้นทุนทำงาน/เดือน: บ้าน vs Co-working vs คาเฟ่</text>
  <g font-family="system-ui,sans-serif">
    <g font-size="11" fill="#94a3b8">
      <text x="50" y="65">รายการ</text>
      <text x="250" y="65" text-anchor="middle" fill="#34d399" font-weight="bold">ทำงานที่บ้าน</text>
      <text x="450" y="65" text-anchor="middle" fill="#60a5fa" font-weight="bold">Co-working</text>
      <text x="650" y="65" text-anchor="middle" fill="#f59e0b" font-weight="bold">คาเฟ่</text>
    </g>
    <line x1="30" y1="75" x2="770" y2="75" stroke="#334155"/>
    <g font-size="12" fill="#cbd5e1">
      <text x="50" y="105">ค่าเช่า/สมาชิก</text>
      <text x="250" y="105" text-anchor="middle" fill="#34d399">0</text>
      <text x="450" y="105" text-anchor="middle">3,500-5,900</text>
      <text x="650" y="105" text-anchor="middle">0</text>
      <text x="50" y="140">ค่าไฟเพิ่ม</text>
      <text x="250" y="140" text-anchor="middle">500-1,500</text>
      <text x="450" y="140" text-anchor="middle" fill="#34d399">0</text>
      <text x="650" y="140" text-anchor="middle" fill="#34d399">0</text>
      <text x="50" y="175">ค่าเน็ตเพิ่ม</text>
      <text x="250" y="175" text-anchor="middle">0-600</text>
      <text x="450" y="175" text-anchor="middle" fill="#34d399">0</text>
      <text x="650" y="175" text-anchor="middle" fill="#34d399">0</text>
      <text x="50" y="210">ค่าเดินทาง</text>
      <text x="250" y="210" text-anchor="middle" fill="#34d399">0</text>
      <text x="450" y="210" text-anchor="middle">1,000-3,000</text>
      <text x="650" y="210" text-anchor="middle">1,500-4,000</text>
      <text x="50" y="245">ค่าเครื่องดื่ม/อาหาร</text>
      <text x="250" y="245" text-anchor="middle" fill="#34d399">0</text>
      <text x="450" y="245" text-anchor="middle">0-500</text>
      <text x="650" y="245" text-anchor="middle" fill="#ef4444">3,000-6,000</text>
      <line x1="30" y1="265" x2="770" y2="265" stroke="#334155"/>
      <text x="50" y="295" font-weight="bold" fill="#f8fafc">รวม/เดือน</text>
      <text x="250" y="295" text-anchor="middle" font-weight="bold" fill="#34d399">500-2,100</text>
      <text x="450" y="295" text-anchor="middle" font-weight="bold" fill="#60a5fa">4,500-9,400</text>
      <text x="650" y="295" text-anchor="middle" font-weight="bold" fill="#f59e0b">4,500-10,000</text>
    </g>
    <rect x="30" y="320" width="740" height="40" rx="6" fill="#064e3b"/>
    <text x="400" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">บ้านถูกสุด แต่ co-working คุ้มกว่าคาเฟ่ ถ้าใช้เกิน 10 วัน/เดือน</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>