<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#a78bfa" text-anchor="middle">ปัจจัยที่เพิ่มมูลค่าธุรกิจฟรีแลนซ์</text>
  <rect x="30" y="55" width="740" height="38" rx="6" fill="#1e293b"/>
  <text x="180" y="79" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">ปัจจัย</text>
  <text x="380" y="79" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">ผลต่อมูลค่า</text>
  <text x="560" y="79" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">วิธีสร้าง</text>
  <text x="710" y="79" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">ความยาก</text>
  <rect x="30" y="98" width="740" height="38" rx="4" fill="#064e3b" opacity="0.3"/>
  <text x="180" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Recurring Revenue</text>
  <text x="380" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">เพิ่ม Multiple สูงสุด</text>
  <text x="560" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Retainer / Subscription</text>
  <text x="710" y="122" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">กลาง</text>
  <rect x="30" y="141" width="740" height="38" rx="4" fill="#1e3a5f" opacity="0.3"/>
  <text x="180" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">ลูกค้าประจำ</text>
  <text x="380" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">+30-50%</text>
  <text x="560" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Retention Rate สูง</text>
  <text x="710" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ต่ำ</text>
  <rect x="30" y="184" width="740" height="38" rx="4" fill="#2d1b4e" opacity="0.3"/>
  <text x="180" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">SOP / Process ชัด</text>
  <text x="380" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">ขายง่ายขึ้นมาก</text>
  <text x="560" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Document ทุกกระบวนการ</text>
  <text x="710" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">กลาง-สูง</text>
  <rect x="30" y="227" width="740" height="38" rx="4" fill="#064e3b" opacity="0.3"/>
  <text x="180" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Brand / ชื่อเสียง</text>
  <text x="380" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ลูกค้า + เบี้ยเพิ่ม</text>
  <text x="560" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Portfolio, Review, PR</text>
  <text x="710" y="251" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">สูง</text>
  <rect x="30" y="270" width="740" height="38" rx="4" fill="#4c0519" opacity="0.3"/>
  <text x="180" y="294" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ทีมงาน / VA</text>
  <text x="380" y="294" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ไม่ขึ้นกับตัวคน</text>
  <text x="560" y="294" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Train ทีม + Delegate</text>
  <text x="710" y="294" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">สูงมาก</text>
  <rect x="30" y="330" width="740" height="45" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="352" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">สูตร Valuation: Revenue Multiplier 1-3x หรือ EBITDA Multiplier 3-5x</text>
  <text x="400" y="368" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ยิ่งมี Recurring Revenue มาก และไม่ขึ้นกับตัวคน Multiple ยิ่งสูง</text>
</svg>
