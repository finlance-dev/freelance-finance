<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">Hiring Decision Framework</text>
  <rect x="300" y="55" width="200" height="52" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="400" y="85" font-family="system-ui,sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">งานนี้ควรจ้างคนทำหรือทำเอง?</text>
  <line x1="400" y1="107" x2="400" y2="135" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="400" y1="135" x2="200" y2="135" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="400" y1="135" x2="600" y2="135" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="128" font-family="system-ui,sans-serif" font-size="12" fill="#34d399">ทำได้เองแต่ใช้เวลา</text>
  <text x="520" y="128" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444">ต้องเชี่ยวชาญเฉพาะทาง</text>
  <line x1="200" y1="135" x2="200" y2="165" stroke="#34d399" stroke-width="1.5"/>
  <rect x="110" y="165" width="180" height="52" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="200" y="188" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">ค่าเวลาของคุณ</text>
  <text x="200" y="207" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">มากกว่าค่าจ้างไหม?</text>
  <line x1="200" y1="217" x2="200" y2="247" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="200" y1="247" x2="120" y2="247" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="200" y1="247" x2="280" y2="247" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="145" y="240" font-family="system-ui,sans-serif" font-size="11" fill="#34d399">ใช่</text>
  <text x="255" y="240" font-family="system-ui,sans-serif" font-size="11" fill="#ef4444">ไม่ใช่</text>
  <line x1="120" y1="247" x2="120" y2="277" stroke="#34d399" stroke-width="1.5"/>
  <rect x="55" y="277" width="130" height="52" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="120" y="297" font-family="system-ui,sans-serif" font-size="13" fill="#34d399" text-anchor="middle">จ้าง</text>
  <text x="120" y="318" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Delegate ได้เลย</text>
  <line x1="280" y1="247" x2="280" y2="277" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="210" y="277" width="130" height="52" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="275" y="297" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ทำเอง</text>
  <text x="275" y="318" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">คุ้มกว่า</text>
  <line x1="600" y1="135" x2="600" y2="165" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="510" y="165" width="180" height="52" rx="8" fill="#4c0519" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="185" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">จ้าง Specialist</text>
  <text x="600" y="205" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">อย่าทำเอง</text>
  <rect x="50" y="355" width="700" height="30" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="400" y="374" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">หลักการ: ถ้าคุณทำงานที่คิดค่าได้ 3,000 บาท/ชม. อย่าเสียเวลาทำงานที่จ้างได้ 500 บาท/ชม.</text>
</svg>
