<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f59e0b" font-weight="700" text-anchor="middle">ตารางสรุปสิทธิ์ลดหย่อนภาษี 2569 สำหรับฟรีแลนซ์</text>
  <rect x="20" y="50" width="760" height="35" rx="6" fill="#1d4ed8"/>
  <text x="200" y="73" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">รายการลดหย่อน</text>
  <text x="500" y="73" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">วงเงินสูงสุด</text>
  <text x="680" y="73" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">หมายเหตุ</text>
  <rect x="20" y="90" width="760" height="32" rx="0" fill="#1e293b"/>
  <text x="200" y="111" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ค่าลดหย่อนส่วนตัว</text>
  <text x="500" y="111" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">60,000 บาท</text>
  <text x="680" y="111" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ทุกคนได้อัตโนมัติ</text>
  <rect x="20" y="122" width="760" height="32" rx="0" fill="#0f172a"/>
  <text x="200" y="143" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ประกันชีวิต</text>
  <text x="500" y="143" font-family="system-ui, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">100,000 บาท</text>
  <text x="680" y="143" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">อายุกรมธรรม์ 10 ปีขึ้นไป</text>
  <rect x="20" y="154" width="760" height="32" rx="0" fill="#1e293b"/>
  <text x="200" y="175" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ประกันสุขภาพ (ตนเอง)</text>
  <text x="500" y="175" font-family="system-ui, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">25,000 บาท</text>
  <text x="680" y="175" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">รวมกับประกันชีวิตไม่เกิน 100K</text>
  <rect x="20" y="186" width="760" height="32" rx="0" fill="#0f172a"/>
  <text x="200" y="207" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">SSF (กองทุนรวมเพื่อการออม)</text>
  <text x="500" y="207" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">30% รายได้ / 200,000 บาท</text>
  <text x="680" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ถือ 10 ปีขึ้นไป</text>
  <rect x="20" y="218" width="760" height="32" rx="0" fill="#1e293b"/>
  <text x="200" y="239" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">RMF (กองทุนรวมเพื่อการเลี้ยงชีพ)</text>
  <text x="500" y="239" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">30% รายได้ / 500,000 บาท</text>
  <text x="680" y="239" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">นับรวม SSF ไม่เกิน 500K</text>
  <rect x="20" y="250" width="760" height="32" rx="0" fill="#0f172a"/>
  <text x="200" y="271" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">เบี้ยประกันสังคม</text>
  <text x="500" y="271" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">9,000 บาท</text>
  <text x="680" y="271" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ม.39 / 750 บาท/เดือน</text>
  <rect x="20" y="282" width="760" height="32" rx="0" fill="#1e293b"/>
  <text x="200" y="303" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Easy e-Receipt 2569</text>
  <text x="500" y="303" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">50,000 บาท</text>
  <text x="680" y="303" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">มี e-Tax Invoice เท่านั้น</text>
  <rect x="20" y="325" width="760" height="45" rx="6" fill="#1a2744"/>
  <text x="200" y="348" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" font-weight="700" text-anchor="middle">ค่าใช้จ่าย (หักก่อนคำนวณ)</text>
  <text x="500" y="348" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="700" text-anchor="middle">60% ไม่จำกัด / ตามจริง</text>
  <text x="680" y="348" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">สำคัญที่สุดสำหรับฟรีแลนซ์</text>
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">วางแผนภาษีให้ดี ประหยัดได้หลักหมื่นถึงหลักแสนต่อปี</text>
</svg>
