<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">DCA vs Lump Sum — เปรียบเทียบ</text>
  <rect x="40" y="55" width="350" height="170" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="215" y="85" font-family="system-ui, sans-serif" font-size="18" fill="#f59e0b" text-anchor="middle" font-weight="700">DCA (ทยอยลงทุน)</text>
  <text x="60" y="115" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">✅ ไม่ต้องจับจังหวะตลาด</text>
  <text x="60" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">✅ เฉลี่ยต้นทุนอัตโนมัติ</text>
  <text x="60" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">✅ เหมาะกับรายได้ไม่แน่นอน</text>
  <text x="60" y="190" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">❌ อาจได้ผลตอบแทนน้อยกว่า</text>
  <text x="60" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">เหมาะ: ฟรีแลนซ์ทุกคน</text>
  <rect x="410" y="55" width="350" height="170" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="585" y="85" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="700">Lump Sum (ลงทุนก้อน)</text>
  <text x="430" y="115" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">✅ ผลตอบแทนสูงกว่า (ถ้าจังหวะดี)</text>
  <text x="430" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">✅ เงินทำงานเร็วกว่า</text>
  <text x="430" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">❌ ต้องมีเงินก้อน</text>
  <text x="430" y="190" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">❌ เสี่ยงถ้าเข้าจังหวะผิด</text>
  <text x="430" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">เหมาะ: มีเงินก้อน + รับเสี่ยงได้</text>
  <rect x="40" y="245" width="720" height="135" rx="8" fill="#1e293b"/>
  <text x="400" y="275" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="700">ตัวอย่าง: ลงทุน ฿5,000/เดือน เป็นเวลา 10 ปี (ผลตอบแทน 8%/ปี)</text>
  <text x="60" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ลงทุนรวม</text><text x="400" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">฿600,000</text>
  <text x="60" y="338" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">มูลค่าปลายทาง (DCA)</text><text x="400" y="338" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="middle" font-weight="700">฿913,000+</text>
  <text x="60" y="368" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">กำไร</text><text x="400" y="368" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="700">+฿313,000 (+52%)</text>
</svg>