  <text x="400" y="387" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ทุก Transaction ต้องบันทึก: วันที่, จำนวน Crypto, มูลค่า THB, ค่าธรรมเนียม</text>
