  <text x="115" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">เสียภาษีอัตราก้าวหน้า</text>
  <line x1="530" y1="255" x2="680" y2="255" stroke="#334155" stroke-width="2"/>
