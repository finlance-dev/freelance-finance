  <text x="685" y="260" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">Capital Gain Tax</text>
  <text x="685" y="280" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">กำไร = ราคาขาย</text>
