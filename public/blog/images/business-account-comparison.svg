  <text x="60" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">1. เตรียมบัตรประชาชน + ทะเบียนบ้าน + หลักฐานรายได้</text>
  <text x="60" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">2. จดทะเบียนพาณิชย์ที่อำเภอ (เสริม ไม่บังคับ) → เปิดบัญชีในชื่อธุรกิจได้</text>
  <text x="60" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">3. ไปธนาคารสาขา แจ้งว่าจะเปิดบัญชีสำหรับรับเงินจากลูกค้าฟรีแลนซ์</text>
  <text x="60" y="380" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">💡 เคล็ดลับ: เลือกธนาคารที่ลูกค้าส่วนใหญ่ใช้ → โอนฟรี ลูกค้าสะดวก</text>
