  <text x="590" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#7c3aed">4. แผนครึ่งปีหลัง</text>
  <text x="430" y="275" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ ปรับราคาค่าบริการ?</text>
