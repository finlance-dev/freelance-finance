  <rect x="410" y="50" width="360" height="160" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="590" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#166534">2. เงินออมและลงทุน</text>
