<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">เทมเพลตรีวิวการเงินกลางปี</text>
  <rect x="30" y="50" width="360" height="160" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="210" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#2563eb">1. รายได้ ม.ค.-มิ.ย.</text>
