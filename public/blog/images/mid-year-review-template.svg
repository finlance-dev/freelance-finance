  <text x="430" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ลงทุน SSF/RMF: __________ บาท</text>
  <text x="430" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">เป้าลดหย่อนปีนี้: __________ บาท</text>
  <text x="430" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">พอร์ตลงทุนรวม: __________</text>
