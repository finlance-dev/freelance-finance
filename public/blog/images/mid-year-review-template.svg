  <text x="50" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ส่วนต่าง: + / - __________ บาท</text>
  <text x="50" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ลูกค้าที่ดีที่สุด: __________</text>
