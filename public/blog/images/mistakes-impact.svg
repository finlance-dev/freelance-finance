  <rect x="40" y="345" width="720" height="40" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="600">⚠ รวมผลกระทบ: เสียรายได้ปีละ 300,000-500,000+ บาท</text>
