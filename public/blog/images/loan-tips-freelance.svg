<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">5 เคล็ดลับกู้เงินให้ผ่านสำหรับฟรีแลนซ์</text>
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="355" height="75" rx="12" fill="#6366f1" opacity="0.06" stroke="#6366f1"/>
    <text x="15" y="28" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#6366f1">1</text>
    <text x="50" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">จดทะเบียนพาณิชย์</text>
    <text x="50" y="50" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">มีเอกสารยืนยันสถานะอาชีพ ธนาคารเชื่อถือมากขึ้น</text>
    <rect x="0" y="85" width="355" height="75" rx="12" fill="#10b981" opacity="0.06" stroke="#10b981"/>
    <text x="15" y="113" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#10b981">2</text>
    <text x="50" y="113" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">ใช้บัญชีธุรกิจรับเงิน 6-12 เดือน</text>
    <text x="50" y="135" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Statement ที่มีเงินเข้าสม่ำเสมอ คือหลักฐานรายได้ที่ดีที่สุด</text>
    <rect x="0" y="170" width="355" height="75" rx="12" fill="#f59e0b" opacity="0.06" stroke="#f59e0b"/>
    <text x="15" y="198" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f59e0b">3</text>
    <text x="50" y="198" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">ยื่นภาษีทุกปี (ภ.ง.ด.90)</text>
    <text x="50" y="220" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ใบเสร็จยื่นภาษีใช้เป็นหลักฐานรายได้ประจำปี</text>
    <rect x="385" y="0" width="355" height="75" rx="12" fill="#ec4899" opacity="0.06" stroke="#ec4899"/>
    <text x="400" y="28" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ec4899">4</text>
    <text x="435" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">ลดหนี้เก่า + จ่ายตรงเวลา</text>
    <text x="435" y="50" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">เครดิตบูโรสะอาด = โอกาสอนุมัติสูงขึ้น 3 เท่า</text>
    <rect x="385" y="85" width="355" height="75" rx="12" fill="#8b5cf6" opacity="0.06" stroke="#8b5cf6"/>
    <text x="400" y="113" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#8b5cf6">5</text>
    <text x="435" y="113" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">เลือกธนาคารที่รับฟรีแลนซ์</text>
    <text x="435" y="135" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">บางธนาคารมีโปรแกรมเฉพาะสำหรับอาชีพอิสระ</text>
    <rect x="385" y="170" width="355" height="75" rx="12" fill="#0ea5e9" opacity="0.05" stroke="#0ea5e9"/>
    <text x="405" y="198" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#0ea5e9">สัดส่วนผ่อนต่อรายได้ (DSR)</text>
    <text x="405" y="220" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ภาระผ่อนรวมไม่ควรเกิน 40% ของรายได้เฉลี่ย</text>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">ธนาคารที่รับพิจารณาฟรีแลนซ์</text>
  <g transform="translate(80,325)">
    <rect x="0" y="0" width="120" height="35" rx="8" fill="#6366f1" opacity="0.1"/>
    <text x="60" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#6366f1">กสิกรไทย</text>
    <rect x="140" y="0" width="120" height="35" rx="8" fill="#10b981" opacity="0.1"/>
    <text x="200" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#10b981">ไทยพาณิชย์</text>
    <rect x="280" y="0" width="120" height="35" rx="8" fill="#f59e0b" opacity="0.1"/>
    <text x="340" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b">กรุงไทย</text>
    <rect x="420" y="0" width="120" height="35" rx="8" fill="#ec4899" opacity="0.1"/>
    <text x="480" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#ec4899">ทีทีบี</text>
    <rect x="560" y="0" width="120" height="35" rx="8" fill="#8b5cf6" opacity="0.1"/>
    <text x="620" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8b5cf6">ออมสิน</text>
  </g>
</svg>