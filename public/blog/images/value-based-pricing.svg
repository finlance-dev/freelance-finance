<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#a78bfa" text-anchor="middle">Value-Based Pricing Framework</text>
  <rect x="30" y="55" width="220" height="300" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="85" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">Cost-Based (ผิด)</text>
  <text x="140" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ต้นทุนชั่วโมง</text>
  <text x="140" y="138" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">+ Overhead</text>
  <text x="140" y="161" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">+ กำไรเล็กน้อย</text>
  <line x1="60" y1="178" x2="220" y2="178" stroke="#334155" stroke-width="1"/>
  <text x="140" y="205" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="middle">= 500 บาท/ชม.</text>
  <text x="140" y="240" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ปัญหา:</text>
  <text x="140" y="260" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ราคาต่ำเกินจริง</text>
  <text x="140" y="280" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">แข่งขันด้วยราคา</text>
  <text x="140" y="300" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ไม่ยั่งยืน</text>
  <rect x="290" y="55" width="220" height="300" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="85" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">Value-Based (ถูก)</text>
  <text x="400" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ลูกค้าได้ประโยชน์อะไร?</text>
  <text x="400" y="138" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ประหยัดเวลาเท่าไหร่?</text>
  <text x="400" y="161" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">สร้างรายได้เพิ่มเท่าไหร่?</text>
  <line x1="310" y1="178" x2="490" y2="178" stroke="#334155" stroke-width="1"/>
  <text x="400" y="205" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="middle">= 3,000 บาท/ชม.</text>
  <text x="400" y="240" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ข้อดี:</text>
  <text x="400" y="260" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ราคาสะท้อนคุณค่า</text>
  <text x="400" y="280" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ไม่แข่งด้วยราคา</text>
  <text x="400" y="300" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ยั่งยืน</text>
  <rect x="550" y="55" width="220" height="300" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="660" y="85" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#34d399" text-anchor="middle">วิธีคำนวณ</text>
  <text x="570" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">1. ลูกค้าได้ ROI เท่าไหร่?</text>
  <text x="570" y="138" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">2. คิด 10-20% ของ ROI</text>
  <text x="570" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ตัวอย่าง:</text>
  <text x="570" y="188" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Website ช่วยขายได้</text>
  <text x="570" y="208" font-family="system-ui,sans-serif" font-size="12" fill="#34d399">500K บาท/ปี</text>
  <text x="570" y="228" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ราคาที่เหมาะสม:</text>
  <text x="660" y="265" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#34d399" text-anchor="middle">50,000-</text>
  <text x="660" y="295" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#34d399" text-anchor="middle">100,000</text>
  <text x="660" y="320" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">บาท</text>
</svg>
