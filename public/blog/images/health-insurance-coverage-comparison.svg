<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">เปรียบเทียบความคุ้มครอง: ประกันสังคม vs เอกชน</text>
  <g font-family="system-ui,sans-serif">
    <g font-size="11" fill="#94a3b8">
      <text x="50" y="60">รายการ</text>
      <text x="320" y="60" text-anchor="middle" fill="#f59e0b" font-weight="bold">ประกันสังคม ม.39</text>
      <text x="530" y="60" text-anchor="middle" fill="#f59e0b" font-weight="bold">ประกันสังคม ม.40</text>
      <text x="720" y="60" text-anchor="middle" fill="#60a5fa" font-weight="bold">ประกันเอกชน</text>
    </g>
    <line x1="30" y1="70" x2="770" y2="70" stroke="#334155"/>
    <g font-size="11" fill="#cbd5e1">
      <text x="50" y="95">เบี้ย/เดือน</text>
      <text x="320" y="95" text-anchor="middle">432 บาท</text>
      <text x="530" y="95" text-anchor="middle">100-300 บาท</text>
      <text x="720" y="95" text-anchor="middle">400-2,500+</text>
      <text x="50" y="125">ผู้ป่วยใน (IPD)</text>
      <text x="320" y="125" text-anchor="middle" fill="#34d399">✓</text>
      <text x="530" y="125" text-anchor="middle" fill="#34d399">✓ (ทางเลือก 2-3)</text>
      <text x="720" y="125" text-anchor="middle" fill="#34d399">✓</text>
      <text x="50" y="155">ผู้ป่วยนอก (OPD)</text>
      <text x="320" y="155" text-anchor="middle" fill="#34d399">✓</text>
      <text x="530" y="155" text-anchor="middle" fill="#ef4444">✗</text>
      <text x="720" y="155" text-anchor="middle" fill="#fbbf24">แล้วแต่แผน</text>
      <text x="50" y="185">เลือก รพ.</text>
      <text x="320" y="185" text-anchor="middle" fill="#ef4444">✗ ตามสิทธิ์</text>
      <text x="530" y="185" text-anchor="middle" fill="#ef4444">✗ รพ.รัฐ</text>
      <text x="720" y="185" text-anchor="middle" fill="#34d399">✓ เลือกได้</text>
      <text x="50" y="215">ทันตกรรม</text>
      <text x="320" y="215" text-anchor="middle" fill="#34d399">✓ 900/ปี</text>
      <text x="530" y="215" text-anchor="middle" fill="#ef4444">✗</text>
      <text x="720" y="215" text-anchor="middle" fill="#fbbf24">แล้วแต่แผน</text>
      <text x="50" y="245">คลอดบุตร</text>
      <text x="320" y="245" text-anchor="middle" fill="#34d399">✓ 15,000</text>
      <text x="530" y="245" text-anchor="middle" fill="#ef4444">✗</text>
      <text x="720" y="245" text-anchor="middle" fill="#fbbf24">แล้วแต่แผน</text>
      <text x="50" y="275">ชราภาพ/บำนาญ</text>
      <text x="320" y="275" text-anchor="middle" fill="#34d399">✓</text>
      <text x="530" y="275" text-anchor="middle" fill="#34d399">✓ (ทางเลือก 3)</text>
      <text x="720" y="275" text-anchor="middle" fill="#ef4444">✗</text>
      <text x="50" y="305">ลดหย่อนภาษี</text>
      <text x="320" y="305" text-anchor="middle" fill="#34d399">✓ ตามจ่ายจริง</text>
      <text x="530" y="305" text-anchor="middle" fill="#34d399">✓ ตามจ่ายจริง</text>
      <text x="720" y="305" text-anchor="middle" fill="#34d399">✓ สูงสุด 25K</text>
    </g>
    <rect x="30" y="330" width="740" height="35" rx="6" fill="#064e3b"/>
    <text x="400" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">แนะนำ: สมัครประกันสังคม ม.40 + เสริมประกันเอกชนตามงบ</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>