<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">คู่มือตั้งราคา Video Editor ฟรีแลนซ์</text>
  <rect x="30" y="50" width="355" height="310" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="207" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#7c3aed">ราคาตามประเภทงาน</text>
  <g font-family="system-ui,sans-serif" font-size="10" fill="#64748b">
    <rect x="45" y="90" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="110">YouTube (10-20 นาที): 1,500-10,000/คลิป</text>
    <rect x="45" y="128" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="148">TikTok/Reels (30-60 วิ): 500-3,000/คลิป</text>
    <rect x="45" y="166" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="186">Corporate (3-5 นาที): 10,000-50,000/ชิ้น</text>
    <rect x="45" y="204" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="224">Wedding (Highlight): 15,000-80,000/งาน</text>
    <rect x="45" y="242" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="262">Motion Graphics: 5,000-30,000/ชิ้น</text>
    <rect x="45" y="280" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="300">Color Grading: 3,000-15,000/โปรเจกต์</text>
    <rect x="45" y="318" width="325" height="30" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="55" y="338">Subtitling: 500-2,000/10 นาที</text>
  </g>
  <rect x="410" y="50" width="360" height="310" rx="8" fill="#fef3c7" stroke="#fde68a"/>
  <text x="590" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#92400e">สูตรคำนวณราคา</text>
  <g font-family="system-ui,sans-serif" font-size="10" fill="#64748b">
    <text x="430" y="100" font-weight="bold" fill="#1e293b">วิธีที่ 1: คิดตามชั่วโมงตัดต่อ</text>
    <text x="430" y="120">Rate: 500-2,000/ชม.</text>
    <text x="430" y="140">YouTube 15 นาที ใช้เวลา ~6-8 ชม.</text>
    <text x="430" y="160">= 3,000-16,000/คลิป</text>
    <text x="430" y="190" font-weight="bold" fill="#1e293b">วิธีที่ 2: คิดตามนาทีของวิดีโอ</text>
    <text x="430" y="210">Rate: 500-3,000/นาที (ขึ้นกับงาน)</text>
    <text x="430" y="230">Corporate 5 นาที = 2,500-15,000</text>
    <text x="430" y="260" font-weight="bold" fill="#1e293b">วิธีที่ 3: Package/Retainer</text>
    <text x="430" y="280">8 คลิป YouTube/เดือน = 40,000-80,000</text>
    <text x="430" y="300">30 คลิป TikTok/เดือน = 10,000-50,000</text>
  </g>
  <rect x="430" y="315" width="320" height="35" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="590" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#166534">Retainer ดีที่สุด: รายได้สม่ำเสมอ!</text>
</svg>