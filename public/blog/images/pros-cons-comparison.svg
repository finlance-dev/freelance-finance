<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">พนักงานประจำ vs ฟรีแลนซ์ — เปรียบเทียบทุกมิติ</text>
  <text x="215" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="700">พนักงานประจำ</text>
  <text x="400" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="700">หัวข้อ</text>
  <text x="585" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="700">ฟรีแลนซ์</text>
  <line x1="40" y1="75" x2="760" y2="75" stroke="#334155" stroke-width="1"/>
  <text x="215" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">คงที่ มีเพดาน</text>
  <text x="400" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">💰 รายได้</text>
  <text x="585" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ไม่จำกัด แต่ไม่แน่นอน</text>
  <text x="215" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">มีครบ ประกัน กองทุน</text>
  <text x="400" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">🏥 สวัสดิการ</text>
  <text x="585" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">จัดการเอง ม.39/40</text>
  <text x="215" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">จำกัด 8 ชม./วัน</text>
  <text x="400" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">⏰ เวลา</text>
  <text x="585" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ยืดหยุ่น เลือกเอง</text>
  <text x="215" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ไปออฟฟิศ</text>
  <text x="400" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">📍 สถานที่</text>
  <text x="585" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ที่ไหนก็ได้</text>
  <text x="215" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">บริษัทหาให้</text>
  <text x="400" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">🤝 ลูกค้า/งาน</text>
  <text x="585" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">หาเอง ตลอดเวลา</text>
  <text x="215" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">หัก ณ ที่จ่าย อัตโนมัติ</text>
  <text x="400" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">📊 ภาษี</text>
  <text x="585" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">จัดการเอง แต่หักได้เยอะ</text>
  <text x="215" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ต่ำ ตามระบบ</text>
  <text x="400" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">⚡ ความเสี่ยง</text>
  <text x="585" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">สูง แต่ reward สูง</text>
  <rect x="40" y="340" width="720" height="45" rx="6" fill="#1e293b"/>
  <text x="400" y="368" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">ไม่มีทางเลือกไหนดีกว่า — ขึ้นอยู่กับไลฟ์สไตล์และเป้าหมายของคุณ</text>
</svg>