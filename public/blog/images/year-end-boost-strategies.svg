<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">6 กลยุทธ์เพิ่มรายได้ Q4 สำหรับฟรีแลนซ์</text>
  <g font-family="system-ui,sans-serif">
    <rect x="30" y="50" width="240" height="100" rx="8" fill="#dcfce7" stroke="#86efac"/>
    <text x="150" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">1. Year-end Package Deal</text>
    <text x="150" y="100" text-anchor="middle" font-size="10" fill="#64748b">เสนอแพ็กเกจราคาพิเศษ</text>
    <text x="150" y="118" text-anchor="middle" font-size="10" fill="#64748b">ให้ลูกค้าใช้งบก่อนสิ้นปี</text>
    <rect x="280" y="50" width="240" height="100" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="400" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">2. Retainer ปีหน้า</text>
    <text x="400" y="100" text-anchor="middle" font-size="10" fill="#64748b">เสนอ retainer contract</text>
    <text x="400" y="118" text-anchor="middle" font-size="10" fill="#64748b">ล็อครายได้ล่วงหน้า</text>
    <rect x="530" y="50" width="240" height="100" rx="8" fill="#fef3c7" stroke="#fde68a"/>
    <text x="650" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">3. Digital Product</text>
    <text x="650" y="100" text-anchor="middle" font-size="10" fill="#64748b">สร้าง template/course</text>
    <text x="650" y="118" text-anchor="middle" font-size="10" fill="#64748b">ขายเป็น passive income</text>
    <rect x="30" y="165" width="240" height="100" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="150" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">4. ขึ้นราคาปีใหม่</text>
    <text x="150" y="215" text-anchor="middle" font-size="10" fill="#64748b">แจ้งลูกค้าล่วงหน้า</text>
    <text x="150" y="233" text-anchor="middle" font-size="10" fill="#64748b">1-2 เดือนก่อนปรับราคา</text>
    <rect x="280" y="165" width="240" height="100" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="400" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2410c">5. Referral Program</text>
    <text x="400" y="215" text-anchor="middle" font-size="10" fill="#64748b">ให้ส่วนลดลูกค้าที่แนะนำ</text>
    <text x="400" y="233" text-anchor="middle" font-size="10" fill="#64748b">คนใหม่มาใช้บริการ</text>
    <rect x="530" y="165" width="240" height="100" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="650" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">6. Upsell ลูกค้าเดิม</text>
    <text x="650" y="215" text-anchor="middle" font-size="10" fill="#64748b">เสนอบริการเพิ่มเติม</text>
    <text x="650" y="233" text-anchor="middle" font-size="10" fill="#64748b">ที่ลูกค้ายังไม่ได้ใช้</text>
  </g>
  <rect x="30" y="290" width="740" height="80" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#059669">ทำไม Q4 คือโอกาสทอง?</text>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">บริษัทมีงบเหลือที่ต้องใช้ก่อนสิ้นปี + โปรเจกต์ต้องปิดก่อน deadline = ฟรีแลนซ์มีอำนาจต่อรองสูง</text>
</svg>