<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#f8fafc">ภาษีหัก ณ ที่จ่าย: ใครหัก เมื่อไหร่ เท่าไหร่</text>
  <g font-family="system-ui,sans-serif">
    <g font-size="11" fill="#94a3b8">
      <text x="50" y="60">ประเภทรายได้</text>
      <text x="280" y="60" text-anchor="middle">อัตราหัก</text>
      <text x="430" y="60" text-anchor="middle">ใครหัก</text>
      <text x="600" y="60" text-anchor="middle">ตัวอย่าง (รับ 10,000)</text>
    </g>
    <line x1="30" y1="70" x2="770" y2="70" stroke="#334155"/>
    <g font-size="12" fill="#cbd5e1">
      <text x="50" y="100" fill="#f59e0b" font-weight="bold">40(2) รับจ้างทำของ</text>
      <text x="280" y="100" text-anchor="middle" fill="#ef4444">3%</text>
      <text x="430" y="100" text-anchor="middle">ลูกค้า (นิติบุคคล)</text>
      <text x="600" y="100" text-anchor="middle">หัก 300 → รับ 9,700</text>
      <text x="50" y="140" fill="#60a5fa" font-weight="bold">40(6) วิชาชีพอิสระ</text>
      <text x="280" y="140" text-anchor="middle" fill="#ef4444">3%</text>
      <text x="430" y="140" text-anchor="middle">ลูกค้า (นิติบุคคล)</text>
      <text x="600" y="140" text-anchor="middle">หัก 300 → รับ 9,700</text>
      <text x="50" y="180" fill="#a78bfa" font-weight="bold">40(7)(8) รับเหมา</text>
      <text x="280" y="180" text-anchor="middle" fill="#ef4444">3%</text>
      <text x="430" y="180" text-anchor="middle">ลูกค้า (นิติบุคคล)</text>
      <text x="600" y="180" text-anchor="middle">หัก 300 → รับ 9,700</text>
      <text x="50" y="220" fill="#34d399" font-weight="bold">ค่าเช่า</text>
      <text x="280" y="220" text-anchor="middle" fill="#ef4444">5%</text>
      <text x="430" y="220" text-anchor="middle">ลูกค้า (นิติบุคคล)</text>
      <text x="600" y="220" text-anchor="middle">หัก 500 → รับ 9,500</text>
      <text x="50" y="260" fill="#fb923c" font-weight="bold">ลูกค้าบุคคลธรรมดา</text>
      <text x="280" y="260" text-anchor="middle" fill="#34d399">0%</text>
      <text x="430" y="260" text-anchor="middle">ไม่มีใครหัก</text>
      <text x="600" y="260" text-anchor="middle" fill="#34d399">ได้เต็ม 10,000</text>
    </g>
    <rect x="30" y="290" width="740" height="70" rx="6" fill="#064e3b"/>
    <text x="400" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">เงินที่ถูกหักไปไม่ได้หายไป → นำไปหักจากภาษีที่ต้องจ่ายตอนยื่น ภ.ง.ด.90</text>
    <text x="400" y="340" text-anchor="middle" font-size="11" fill="#a7f3d0">ถ้าถูกหักไปรวมทั้งปีมากกว่าภาษีที่ต้องจ่าย → ขอคืนภาษีได้!</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>