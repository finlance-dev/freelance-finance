<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">เปรียบเทียบ: ไม่แยกบัญชี vs แยกบัญชี</text>
  <rect x="30" y="50" width="360" height="320" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="210" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#dc2626">❌ ไม่แยกบัญชี</text>
  <text x="50" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• เงินเข้าออกปนกัน ไม่รู้กำไรจริง</text>
  <text x="50" y="135" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ยื่นภาษีลำบาก แยกรายจ่ายไม่ออก</text>
  <text x="50" y="160" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ใช้เงินธุรกิจซื้อของส่วนตัวโดยไม่รู้ตัว</text>
  <text x="50" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• วางแผนการเงินยาก ไม่รู้ cash flow</text>
  <text x="50" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• กู้สินเชื่อยาก ธนาคารเห็นรายการปน</text>
  <rect x="50" y="240" width="320" height="50" rx="8" fill="#fee2e2"/>
  <text x="210" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">ตัวอย่าง: รายได้ 50K แต่ใช้จ่ายส่วนตัว 30K</text>
  <text x="210" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">คิดว่ามีเงิน 20K แต่จริงๆ กำไรธุรกิจแค่ 35K</text>
  <rect x="410" y="50" width="360" height="320" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="590" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#16a34a">✅ แยกบัญชี</text>
  <text x="430" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• เห็นรายรับธุรกิจชัดเจน</text>
  <text x="430" y="135" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ยื่นภาษีง่าย ค่าใช้จ่ายชัดเจน</text>
  <text x="430" y="160" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• รู้ cash flow ธุรกิจแม่นยำ</text>
  <text x="430" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• วางแผนเงินเดือนตัวเองได้</text>
  <text x="430" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• กู้สินเชื่อง่ายขึ้น statement สวย</text>
  <rect x="430" y="240" width="320" height="50" rx="8" fill="#dcfce7"/>
  <text x="590" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">ตัวอย่าง: รายได้ธุรกิจ 50K ค่าใช้จ่าย 15K</text>
  <text x="590" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">กำไรจริง 35K → จ่ายเงินเดือนตัวเอง 25K</text>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ใช้ Finlance แยกบัญชีธุรกิจอัตโนมัติ ดู cash flow ชัดเจน</text>
</svg>