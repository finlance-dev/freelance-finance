<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">5 ขั้นตอนจัดการ Financial Anxiety</text>
  <rect x="30" y="60" width="140" height="130" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="100" y="95" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#60a5fa" text-anchor="middle">1</text>
  <text x="100" y="120" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">รับรู้</text>
  <text x="100" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ยอมรับว่า</text>
  <text x="100" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">วิตกกังวลอยู่</text>
  <text x="175" y="130" font-family="system-ui,sans-serif" font-size="24" fill="#60a5fa" text-anchor="middle">→</text>
  <rect x="190" y="60" width="140" height="130" rx="10" fill="#2d1b4e" stroke="#a78bfa" stroke-width="2"/>
  <text x="260" y="95" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#a78bfa" text-anchor="middle">2</text>
  <text x="260" y="120" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">วิเคราะห์</text>
  <text x="260" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ดูตัวเลขจริง</text>
  <text x="260" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ไม่ใช่ความกลัว</text>
  <text x="335" y="130" font-family="system-ui,sans-serif" font-size="24" fill="#a78bfa" text-anchor="middle">→</text>
  <rect x="350" y="60" width="140" height="130" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="95" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="420" y="120" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">วางแผน</text>
  <text x="420" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">สร้าง Emergency</text>
  <text x="420" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Fund 6 เดือน</text>
  <text x="495" y="130" font-family="system-ui,sans-serif" font-size="24" fill="#f59e0b" text-anchor="middle">→</text>
  <rect x="510" y="60" width="140" height="130" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="580" y="95" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#34d399" text-anchor="middle">4</text>
  <text x="580" y="120" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">ลงมือทำ</text>
  <text x="580" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ทำตามแผน</text>
  <text x="580" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ทีละขั้นตอน</text>
  <text x="655" y="130" font-family="system-ui,sans-serif" font-size="24" fill="#34d399" text-anchor="middle">→</text>
  <rect x="670" y="60" width="100" height="130" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="720" y="95" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#60a5fa" text-anchor="middle">5</text>
  <text x="720" y="120" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">ทบทวน</text>
  <text x="720" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Review</text>
  <text x="720" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ทุกเดือน</text>
  <rect x="30" y="215" width="740" height="155" rx="10" fill="#1e293b"/>
  <text x="400" y="243" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle">สัญญาณที่ต้องระวัง vs ปกติ</text>
  <text x="60" y="270" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" font-weight="700">ความวิตกกังวลผิดปกติ:</text>
  <text x="60" y="292" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">• ตื่นกลางดึกเพราะเรื่องเงิน | นอนไม่หลับเรื้อรัง</text>
  <text x="60" y="312" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">• หลีกเลี่ยงดูบัญชีเพราะกลัว | ใช้จ่ายเกินเพื่อบรรเทาความเครียด</text>
  <text x="400" y="270" font-family="system-ui,sans-serif" font-size="13" fill="#34d399" font-weight="700">ความกังวลตามปกติ:</text>
  <text x="400" y="292" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">• กังวลก่อนส่ง Invoice | กลัวเสียลูกค้า</text>
  <text x="400" y="312" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">• ไม่แน่ใจเรื่องราคา | กังวลว่างานช่วง Low Season</text>
  <text x="400" y="350" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">ถ้ากังวลมากจนกระทบชีวิต ควรปรึกษาผู้เชี่ยวชาญ</text>
</svg>
