<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">3 วิธีตั้งราคาค่าบริการฟรีแลนซ์</text>
  <rect x="30" y="55" width="230" height="310" rx="16" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-width="2"/>
  <rect x="70" y="75" width="150" height="40" rx="10" fill="#6366f1"/>
  <text x="145" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="white">Cost-Based</text>
  <text x="145" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#6366f1">คิดจากต้นทุน</text>
  <text x="50" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• คำนวณค่าใช้จ่ายทั้งหมด</text>
  <text x="50" y="192" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• บวกกำไรที่ต้องการ</text>
  <text x="50" y="214" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• หาร ÷ ชั่วโมงทำงาน</text>
  <rect x="50" y="240" width="190" height="40" rx="8" fill="#6366f1" opacity="0.1"/>
  <text x="145" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#6366f1">= ราคาขั้นต่ำ</text>
  <rect x="50" y="295" width="190" height="50" rx="8" fill="#10b981" opacity="0.08"/>
  <text x="145" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">เหมาะ: ฟรีแลนซ์มือใหม่</text>
  <text x="145" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">ง่าย ไม่ขาดทุน</text>
  <rect x="285" y="55" width="230" height="310" rx="16" fill="#10b981" opacity="0.06" stroke="#10b981" stroke-width="2"/>
  <rect x="325" y="75" width="150" height="40" rx="10" fill="#10b981"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="white">Value-Based</text>
  <text x="400" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#10b981">คิดจากคุณค่า</text>
  <text x="305" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ลูกค้าได้ประโยชน์อะไร</text>
  <text x="305" y="192" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ROI ที่ลูกค้าจะได้</text>
  <text x="305" y="214" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ตั้งราคาตาม impact</text>
  <rect x="305" y="240" width="190" height="40" rx="8" fill="#10b981" opacity="0.1"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#10b981">= ราคาสูงสุดได้</text>
  <rect x="305" y="295" width="190" height="50" rx="8" fill="#f59e0b" opacity="0.08"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b">เหมาะ: มีประสบการณ์</text>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b">รายได้สูง แต่ต้องพิสูจน์คุณค่า</text>
  <rect x="540" y="55" width="230" height="310" rx="16" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="2"/>
  <rect x="580" y="75" width="150" height="40" rx="10" fill="#f59e0b"/>
  <text x="655" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="white">Market-Rate</text>
  <text x="655" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">คิดจากตลาด</text>
  <text x="560" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• สำรวจราคาคู่แข่ง</text>
  <text x="560" y="192" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ปรับตามประสบการณ์</text>
  <text x="560" y="214" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• วางตำแหน่งในตลาด</text>
  <rect x="560" y="240" width="190" height="40" rx="8" fill="#f59e0b" opacity="0.1"/>
  <text x="655" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">= ราคาแข่งขันได้</text>
  <rect x="560" y="295" width="190" height="50" rx="8" fill="#8b5cf6" opacity="0.08"/>
  <text x="655" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">เหมาะ: ทุกระดับ</text>
  <text x="655" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">ปลอดภัย ลูกค้ายอมรับง่าย</text>
</svg>