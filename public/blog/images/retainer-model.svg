<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">เปรียบเทียบ: Retainer vs Project-based</text>
  <rect x="30" y="50" width="360" height="160" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="210" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#059669">Retainer Contract</text>
  <text x="50" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ รายได้สม่ำเสมอทุกเดือน</text>
  <text x="50" y="130" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ วางแผนการเงินง่าย</text>
  <text x="50" y="150" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ ไม่ต้องหาลูกค้าใหม่ตลอด</text>
  <text x="50" y="170" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ สร้างความสัมพันธ์ระยะยาว</text>
  <text x="50" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">- ราคาต่อชม. อาจต่ำกว่า project</text>
  <rect x="410" y="50" width="360" height="160" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="590" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Project-based</text>
  <text x="430" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ ราคาต่อชม. สูงกว่า</text>
  <text x="430" y="130" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ ยืดหยุ่น เลือกงานได้</text>
  <text x="430" y="150" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">+ หลากหลาย สร้าง portfolio ได้</text>
  <text x="430" y="170" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">- รายได้ไม่แน่นอน</text>
  <text x="430" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">- ต้องหาลูกค้าใหม่ตลอด</text>
  <rect x="30" y="225" width="740" height="145" rx="10" fill="white" stroke="#e2e8f0"/>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">ตัวอย่าง Retainer Package</text>
  <text x="200" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#0d9488">Basic: 15,000/เดือน</text>
  <text x="200" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">ดูแลเว็บ + content 2 ชิ้น</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#0d9488">Standard: 30,000/เดือน</text>
  <text x="400" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">ดูแลเว็บ + content 4 + SEO</text>
  <text x="600" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#0d9488">Premium: 50,000/เดือน</text>
  <text x="600" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Full digital marketing</text>
  <text x="400" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">สัดส่วนที่แนะนำ: Retainer 60% + Project 40% = สมดุลที่ดี</text>
</svg>