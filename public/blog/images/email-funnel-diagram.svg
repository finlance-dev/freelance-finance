<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#60a5fa" font-weight="700" text-anchor="middle">Email Marketing Funnel สำหรับฟรีแลนซ์</text>
  <polygon points="100,55 700,55 640,125 160,125" fill="#1d4ed8" opacity="0.8"/>
  <text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">Awareness — Lead Magnet (ฟรี)</text>
  <text x="400" y="118" font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle">E-Book / Checklist / Template ฟรีเพื่อดึง Email</text>
  <polygon points="165,135 635,135 580,205 220,205" fill="#1e40af" opacity="0.8"/>
  <text x="400" y="178" font-family="system-ui, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">Nurture — Email Sequence</text>
  <text x="400" y="198" font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle">5-7 emails ให้ Value + เล่า Story + สร้าง Trust</text>
  <polygon points="225,215 575,215 520,285 280,285" fill="#1e3a8a" opacity="0.8"/>
  <text x="400" y="258" font-family="system-ui, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">Offer — Pitch บริการ/Product</text>
  <text x="400" y="278" font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle">เสนอ Package ที่ตรงปัญหา + Urgency</text>
  <polygon points="285,295 515,295 460,355 340,355" fill="#172554" opacity="0.8"/>
  <text x="400" y="338" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="700">Convert — ลูกค้าจ่ายเงิน</text>
  <rect x="540" y="60" width="230" height="120" rx="10" fill="#1e293b"/>
  <text x="655" y="90" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="600">Tools แนะนำ</text>
  <text x="555" y="115" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">• Mailchimp (ฟรีถึง 500 คน)</text>
  <text x="555" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">• ConvertKit (สำหรับ Creator)</text>
  <text x="555" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">• Brevo (ฟรีแลนซ์ไทยนิยม)</text>
  <rect x="20" y="60" width="100" height="290" rx="10" fill="#1e293b"/>
  <text x="70" y="90" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Subscribers</text>
  <text x="70" y="145" font-family="system-ui, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle" font-weight="700">1,000</text>
  <text x="70" y="180" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Open 40%</text>
  <text x="70" y="230" font-family="system-ui, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle" font-weight="700">400</text>
  <text x="70" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Click 15%</text>
  <text x="70" y="310" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" text-anchor="middle" font-weight="700">60</text>
  <text x="70" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Convert</text>
  <text x="70" y="350" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">5%</text>
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Email List เป็น Asset ของคุณ — ไม่ขึ้นกับ Algorithm ของ Social Media</text>
</svg>
