<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">ใบเสร็จรับเงิน vs ใบกำกับภาษี — เปรียบเทียบ</text>
  <rect x="30" y="50" width="170" height="35" rx="6" fill="#0891b2" opacity="0.15"/>
  <text x="115" y="73" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#0891b2">รายการ</text>
  <rect x="210" y="50" width="270" height="35" rx="6" fill="#0891b2" opacity="0.15"/>
  <text x="345" y="73" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#0891b2">ใบเสร็จรับเงิน</text>
  <rect x="490" y="50" width="280" height="35" rx="6" fill="#0891b2" opacity="0.15"/>
  <text x="630" y="73" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#0891b2">ใบกำกับภาษี</text>
  <g font-family="system-ui,sans-serif" font-size="11" fill="#64748b">
    <rect x="30" y="92" width="740" height="32" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="115" y="113" text-anchor="middle" font-weight="bold" fill="#1e293b">ต้องจด VAT?</text>
    <text x="345" y="113" text-anchor="middle">ไม่ต้อง ออกได้เลย</text>
    <text x="630" y="113" text-anchor="middle" fill="#dc2626">ต้องจด VAT ก่อน</text>
    <rect x="30" y="128" width="740" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="115" y="149" text-anchor="middle" font-weight="bold" fill="#1e293b">แสดง VAT 7%?</text>
    <text x="345" y="149" text-anchor="middle">ไม่แสดง</text>
    <text x="630" y="149" text-anchor="middle">แสดงแยกชัดเจน</text>
    <rect x="30" y="164" width="740" height="32" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="115" y="185" text-anchor="middle" font-weight="bold" fill="#1e293b">ผู้ซื้อขอคืน VAT?</text>
    <text x="345" y="185" text-anchor="middle">ไม่ได้</text>
    <text x="630" y="185" text-anchor="middle" fill="#16a34a">ได้</text>
    <rect x="30" y="200" width="740" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="115" y="221" text-anchor="middle" font-weight="bold" fill="#1e293b">ออกเมื่อ?</text>
    <text x="345" y="221" text-anchor="middle">เมื่อได้รับเงินแล้ว</text>
    <text x="630" y="221" text-anchor="middle">เมื่อส่งมอบสินค้า/บริการ</text>
    <rect x="30" y="236" width="740" height="32" rx="4" fill="white" stroke="#e2e8f0"/>
    <text x="115" y="257" text-anchor="middle" font-weight="bold" fill="#1e293b">เหมาะกับ?</text>
    <text x="345" y="257" text-anchor="middle">ฟรีแลนซ์รายได้ไม่เกิน 1.8 ล้าน</text>
    <text x="630" y="257" text-anchor="middle">ธุรกิจรายได้เกิน 1.8 ล้าน</text>
    <rect x="30" y="272" width="740" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="115" y="293" text-anchor="middle" font-weight="bold" fill="#1e293b">ข้อมูลที่ต้องมี</text>
    <text x="345" y="293" text-anchor="middle">ชื่อ ที่อยู่ รายการ จำนวนเงิน</text>
    <text x="630" y="293" text-anchor="middle">+ เลข VAT 13 หลัก + ยอด VAT</text>
  </g>
  <rect x="30" y="320" width="740" height="55" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#059669">สรุป: ฟรีแลนซ์ส่วนใหญ่ใช้ใบเสร็จรับเงิน (ไม่ต้องจด VAT)</text>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ถ้ารายได้เกิน 1.8 ล้าน/ปี → ต้องจด VAT → ออกใบกำกับภาษี</text>
</svg>