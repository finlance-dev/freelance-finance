<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">ค่าลดหย่อนภาษีที่ฟรีแลนซ์ใช้ได้</text>
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="320" height="65" rx="12" fill="#6366f1" opacity="0.08" stroke="#6366f1"/><text x="20" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#6366f1">ส่วนตัว</text><text x="20" y="48" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">60,000 บาท (ได้อัตโนมัติ)</text><text x="260" y="38" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#6366f1">60K</text>
    <rect x="340" y="0" width="320" height="65" rx="12" fill="#10b981" opacity="0.08" stroke="#10b981"/><text x="360" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#10b981">คู่สมรส + บุตร</text><text x="360" y="48" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">60K + 30K/คน</text><text x="600" y="38" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#10b981">90K+</text>
    <rect x="0" y="75" width="320" height="65" rx="12" fill="#f59e0b" opacity="0.08" stroke="#f59e0b"/><text x="20" y="103" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">ประกันชีวิต + สุขภาพ</text><text x="20" y="123" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">สูงสุด 100,000 บาท</text><text x="260" y="113" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">100K</text>
    <rect x="340" y="75" width="320" height="65" rx="12" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6"/><text x="360" y="103" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6">กองทุน SSF</text><text x="360" y="123" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">สูงสุด 200,000 บาท</text><text x="600" y="113" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">200K</text>
    <rect x="0" y="150" width="320" height="65" rx="12" fill="#ec4899" opacity="0.08" stroke="#ec4899"/><text x="20" y="178" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#ec4899">กองทุน RMF</text><text x="20" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">สูงสุด 500,000 บาท</text><text x="260" y="188" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#ec4899">500K</text>
    <rect x="340" y="150" width="320" height="65" rx="12" fill="#ef4444" opacity="0.08" stroke="#ef4444"/><text x="360" y="178" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#ef4444">ประกันสังคม ม.40</text><text x="360" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">3,600 บาท/ปี</text><text x="600" y="188" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#ef4444">3.6K</text>
    <rect x="0" y="225" width="660" height="55" rx="12" fill="#10b981" opacity="0.05" stroke="#10b981" stroke-dasharray="6,4"/>
    <text x="330" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#10b981">บริจาคเพื่อการศึกษา ลดหย่อนได้ 2 เท่า | e-Donation ไม่ต้องเก็บใบเสร็จ</text>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">* SSF+RMF+PVD+ประกันบำนาญ รวมกันไม่เกิน 500,000 บาท</text>
</svg>