<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">คำนวณอัตราค่าเขียนที่ควรคิด</text>
  <rect x="30" y="50" width="360" height="155" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="210" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#2563eb">ค่าเขียนตามตลาด (บาท/คำ)</text>
  <g font-family="system-ui,sans-serif" font-size="11" fill="#64748b">
    <text x="50" y="100">Content Writer ทั่วไป: 0.5-1.5 บาท</text>
    <text x="50" y="120">Copywriter: 2-5 บาท</text>
    <text x="50" y="140">SEO Content Specialist: 3-8 บาท</text>
    <text x="50" y="160">Conversion Copywriter: 5-15 บาท</text>
    <text x="50" y="180">Brand Strategist: คิดเป็นโปรเจกต์</text>
  </g>
  <rect x="410" y="50" width="360" height="155" rx="8" fill="#fef3c7" stroke="#fde68a"/>
  <text x="590" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#92400e">สูตรคำนวณรายได้เป้าหมาย</text>
  <g font-family="system-ui,sans-serif" font-size="11" fill="#64748b">
    <text x="430" y="100">เป้ารายได้: 80,000 บาท/เดือน</text>
    <text x="430" y="120">วันทำงาน: 22 วัน</text>
    <text x="430" y="140">ชั่วโมง/วัน: 6 (เขียนจริง)</text>
    <text x="430" y="160">คำ/ชั่วโมง: 500-1,000 คำ</text>
    <text x="430" y="180">= ต้องเขียน 3 บาท/คำ ขึ้นไป</text>
  </g>
  <rect x="30" y="220" width="740" height="150" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#166534">ตัวอย่าง: เปรียบเทียบ 3 รูปแบบการคิดเงิน</text>
  <g font-family="system-ui,sans-serif" font-size="11" fill="#64748b">
    <rect x="50" y="265" width="220" height="85" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="160" y="288" text-anchor="middle" font-weight="bold" fill="#dc2626">คิดต่อคำ (1 บาท)</text>
    <text x="160" y="308" text-anchor="middle">บทความ 2,000 คำ = 2,000</text>
    <text x="160" y="328" text-anchor="middle">ใช้เวลา 4 ชม. = 500/ชม.</text>
    <rect x="290" y="265" width="220" height="85" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="400" y="288" text-anchor="middle" font-weight="bold" fill="#f59e0b">คิดต่อบทความ (5,000)</text>
    <text x="400" y="308" text-anchor="middle">บทความ 2,000 คำ = 5,000</text>
    <text x="400" y="328" text-anchor="middle">ใช้เวลา 4 ชม. = 1,250/ชม.</text>
    <rect x="530" y="265" width="220" height="85" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="640" y="288" text-anchor="middle" font-weight="bold" fill="#166534">Retainer (30K/เดือน)</text>
    <text x="640" y="308" text-anchor="middle">8 บทความ/เดือน = 3,750/ชิ้น</text>
    <text x="640" y="328" text-anchor="middle">รายได้สม่ำเสมอ ดีที่สุด</text>
  </g>
</svg>