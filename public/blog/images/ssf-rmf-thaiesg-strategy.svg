<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">กลยุทธ์ลดหย่อนภาษีด้วยกองทุนตามระดับรายได้</text>
  <g font-family="system-ui,sans-serif">
    <rect x="30" y="50" width="740" height="75" rx="8" fill="#1e293b" stroke="#f59e0b"/>
    <text x="50" y="75" font-size="14" font-weight="bold" fill="#f59e0b">ระดับ 1: รายได้ 300K-600K/ปี</text>
    <text x="50" y="95" font-size="11" fill="#cbd5e1">→ ซื้อ SSF เพียงอย่างเดียว 50,000-100,000 บาท</text>
    <text x="50" y="112" font-size="11" fill="#94a3b8">ประหยัดภาษี: ~5,000-10,000 บาท/ปี</text>

    <rect x="30" y="135" width="740" height="75" rx="8" fill="#1e293b" stroke="#34d399"/>
    <text x="50" y="160" font-size="14" font-weight="bold" fill="#34d399">ระดับ 2: รายได้ 600K-1.2M/ปี</text>
    <text x="50" y="180" font-size="11" fill="#cbd5e1">→ SSF เต็ม 200,000 + ThaiESG 100,000 = 300,000 บาท</text>
    <text x="50" y="197" font-size="11" fill="#94a3b8">ประหยัดภาษี: ~30,000-60,000 บาท/ปี</text>

    <rect x="30" y="220" width="740" height="75" rx="8" fill="#1e293b" stroke="#60a5fa"/>
    <text x="50" y="245" font-size="14" font-weight="bold" fill="#60a5fa">ระดับ 3: รายได้ 1.2M-3M/ปี</text>
    <text x="50" y="265" font-size="11" fill="#cbd5e1">→ SSF 200,000 + RMF 200,000 + ThaiESG 100,000 = 500,000 บาท (เต็มเพดาน)</text>
    <text x="50" y="282" font-size="11" fill="#94a3b8">ประหยัดภาษี: ~75,000-150,000 บาท/ปี</text>

    <rect x="30" y="305" width="740" height="55" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="50" y="330" font-size="14" font-weight="bold" fill="#a78bfa">ระดับ 4: รายได้ 3M+/ปี</text>
    <text x="50" y="347" font-size="11" fill="#cbd5e1">→ เต็มเพดาน 500,000 + พิจารณาประกันชีวิต/เงินบริจาค เพิ่มเติม</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>