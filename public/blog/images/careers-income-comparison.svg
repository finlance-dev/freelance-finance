<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">10 อาชีพฟรีแลนซ์ยอดนิยม — เปรียบเทียบ</text>
  <rect x="40" y="55" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="60" y="83" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa">1. Developer — เข้าง่าย ⭐⭐⭐ รายได้ ⭐⭐⭐⭐⭐</text>
  <rect x="40" y="108" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="60" y="136" font-family="system-ui, sans-serif" font-size="13" fill="#60a5fa">2. Designer — เข้าง่าย ⭐⭐⭐⭐ รายได้ ⭐⭐⭐⭐</text>
  <rect x="40" y="161" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="60" y="189" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">3. นักเขียน — เข้าง่าย ⭐⭐⭐⭐⭐ รายได้ ⭐⭐⭐</text>
  <rect x="40" y="214" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="60" y="242" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b">4. ช่างภาพ — เข้าง่าย ⭐⭐⭐ รายได้ ⭐⭐⭐</text>
  <rect x="40" y="267" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="60" y="295" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">5. Video Editor — เข้าง่าย ⭐⭐⭐ รายได้ ⭐⭐⭐⭐</text>
  <rect x="410" y="55" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="430" y="83" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa">6. Marketing — เข้าง่าย ⭐⭐⭐⭐ รายได้ ⭐⭐⭐⭐</text>
  <rect x="410" y="108" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="430" y="136" font-family="system-ui, sans-serif" font-size="13" fill="#60a5fa">7. VA — เข้าง่าย ⭐⭐⭐⭐⭐ รายได้ ⭐⭐</text>
  <rect x="410" y="161" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="430" y="189" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">8. Data Analyst — เข้าง่าย ⭐⭐ รายได้ ⭐⭐⭐⭐</text>
  <rect x="410" y="214" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="430" y="242" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b">9. นักแปล — เข้าง่าย ⭐⭐⭐⭐ รายได้ ⭐⭐⭐</text>
  <rect x="410" y="267" width="350" height="45" rx="6" fill="#1e293b"/>
  <text x="430" y="295" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">10. Consultant — เข้าง่าย ⭐ รายได้ ⭐⭐⭐⭐⭐</text>
  <rect x="40" y="330" width="720" height="50" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="360" font-family="system-ui, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">⭐ = ระดับต่ำ → ⭐⭐⭐⭐⭐ = ระดับสูง</text>
</svg>