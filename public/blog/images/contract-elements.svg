    <text x="618" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#ec4899">การยกเลิก</text>
    <text x="618" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">เงื่อนไขยกเลิก</text>
    <text x="618" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Kill Fee ค่ายกเลิกงาน</text>
