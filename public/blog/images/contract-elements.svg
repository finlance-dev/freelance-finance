<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">องค์ประกอบสำคัญของสัญญาจ้างงานฟรีแลนซ์</text>
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="235" height="100" rx="14" fill="#6366f1" opacity="0.08" stroke="#6366f1"/>
