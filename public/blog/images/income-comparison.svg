<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">เปรียบเทียบรายได้: ฟรีแลนซ์ vs พนักงานประจำ</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">รายได้สุทธิต่อเดือน (หลังหักภาษี) — กรณีรายได้รวม 600K/ปี</text>
  <g transform="translate(60,75)">
    <text x="0" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ม.ค.</text>
    <text x="60" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ก.พ.</text>
    <text x="120" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">มี.ค.</text>
    <text x="180" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">เม.ย.</text>
    <text x="240" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">พ.ค.</text>
    <text x="300" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">มิ.ย.</text>
    <text x="360" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ก.ค.</text>
    <text x="420" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ส.ค.</text>
    <text x="480" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ก.ย.</text>
    <text x="540" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ต.ค.</text>
    <text x="600" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">พ.ย.</text>
    <text x="660" y="15" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ธ.ค.</text>
  </g>
  <line x1="60" y1="100" x2="720" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="45" y="104" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">80K</text>
  <line x1="60" y1="150" x2="720" y2="150" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="45" y="154" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">50K</text>
  <line x1="60" y1="200" x2="720" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="45" y="204" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">30K</text>
  <line x1="60" y1="250" x2="720" y2="250" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="45" y="254" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">10K</text>
  <line x1="60" y1="120" x2="720" y2="120" stroke="#10b981" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="725" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#10b981">พนักงาน</text>
  <polyline points="70,170 130,110 190,130 250,90 310,195 370,140 430,120 490,160 550,180 610,100 670,150 720,130" stroke="#6366f1" stroke-width="3" fill="none"/>
  <g>
    <circle cx="70" cy="170" r="4" fill="#6366f1"/><circle cx="130" cy="110" r="4" fill="#6366f1"/><circle cx="190" cy="130" r="4" fill="#6366f1"/><circle cx="250" cy="90" r="4" fill="#6366f1"/><circle cx="310" cy="195" r="4" fill="#6366f1"/><circle cx="370" cy="140" r="4" fill="#6366f1"/><circle cx="430" cy="120" r="4" fill="#6366f1"/><circle cx="490" cy="160" r="4" fill="#6366f1"/><circle cx="550" cy="180" r="4" fill="#6366f1"/><circle cx="610" cy="100" r="4" fill="#6366f1"/><circle cx="670" cy="150" r="4" fill="#6366f1"/><circle cx="720" cy="130" r="4" fill="#6366f1"/>
  </g>
  <rect x="100" y="290" width="250" height="80" rx="12" fill="#6366f1" opacity="0.08" stroke="#6366f1"/>
  <text x="225" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#6366f1">ฟรีแลนซ์</text>
  <text x="225" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">รายได้ไม่สม่ำเสมอ</text>
  <text x="225" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">แต่มีโอกาสเดือนดีมาก</text>
  <rect x="450" y="290" width="250" height="80" rx="12" fill="#10b981" opacity="0.08" stroke="#10b981"/>
  <text x="575" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#10b981">พนักงานประจำ</text>
  <text x="575" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">รายได้คงที่ทุกเดือน</text>
  <text x="575" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">คาดการณ์ง่าย วางแผนง่าย</text>
</svg>