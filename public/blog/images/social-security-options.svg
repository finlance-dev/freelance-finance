    <rect x="30" y="335" width="740" height="35" rx="6" fill="#064e3b"/>
    <text x="400" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">แนะนำ: ทางเลือก 2 คุ้มที่สุด (เพิ่มแค่ 30 บ. ได้สิทธิ์ชราภาพ)</text>
