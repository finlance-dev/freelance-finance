<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" fill="#f59e0b" font-weight="700" text-anchor="middle">Checklist จดทะเบียนพาณิชย์อิเล็กทรอนิกส์</text>
  <rect x="40" y="60" width="340" height="310" rx="10" fill="#1e293b"/>
  <text x="210" y="90" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" font-weight="600" text-anchor="middle">เอกสารที่ต้องเตรียม</text>
  <rect x="55" y="105" width="310" height="40" rx="6" fill="#0f172a"/>
  <text x="75" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#34d399">✓</text>
  <text x="100" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">สำเนาบัตรประชาชน (ผู้จดทะเบียน)</text>
  <rect x="55" y="155" width="310" height="40" rx="6" fill="#1a1a2e"/>
  <text x="75" y="180" font-family="system-ui, sans-serif" font-size="14" fill="#34d399">✓</text>
  <text x="100" y="180" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ทะเบียนบ้านปัจจุบัน</text>
  <rect x="55" y="205" width="310" height="40" rx="6" fill="#0f172a"/>
  <text x="75" y="230" font-family="system-ui, sans-serif" font-size="14" fill="#34d399">✓</text>
  <text x="100" y="230" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">หลักฐานที่อยู่สำหรับประกอบการค้า</text>
  <rect x="55" y="255" width="310" height="40" rx="6" fill="#1a1a2e"/>
  <text x="75" y="280" font-family="system-ui, sans-serif" font-size="14" fill="#34d399">✓</text>
  <text x="100" y="280" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ชื่อร้านค้า (ภาษาไทย/อังกฤษ)</text>
  <rect x="55" y="305" width="310" height="40" rx="6" fill="#0f172a"/>
  <text x="75" y="330" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b">!</text>
  <text x="100" y="330" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">อีเมลและเบอร์โทรศัพท์ที่ใช้งานได้</text>
  <rect x="420" y="60" width="340" height="310" rx="10" fill="#1e293b"/>
  <text x="590" y="90" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" font-weight="600" text-anchor="middle">ขั้นตอนการจด</text>
  <rect x="435" y="105" width="310" height="50" rx="6" fill="#1a2744"/>
  <text x="455" y="128" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" font-weight="600">1. เข้าเว็บ DBD e-Registration</text>
  <text x="455" y="148" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">www.dbd.go.th → บริการออนไลน์</text>
  <rect x="435" y="165" width="310" height="50" rx="6" fill="#0f172a"/>
  <text x="455" y="188" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" font-weight="600">2. ลงทะเบียน/เข้าสู่ระบบ</text>
  <text x="455" y="208" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">ใช้เลขบัตรประชาชน 13 หลัก</text>
  <rect x="435" y="225" width="310" height="50" rx="6" fill="#1a2744"/>
  <text x="455" y="248" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" font-weight="600">3. กรอกข้อมูลพาณิชย์</text>
  <text x="455" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">ประเภทธุรกิจ ที่ตั้ง รายละเอียด</text>
  <rect x="435" y="285" width="310" height="50" rx="6" fill="#0f172a"/>
  <text x="455" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" font-weight="600">4. แนบเอกสารและส่ง</text>
  <text x="455" y="328" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">รอผล 1-3 วันทำการ (ฟรี)</text>
  <text x="400" y="385" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">ต้องจดถ้ามีรายได้จากการขายออนไลน์เกิน 1.8 ล้านบาท/ปี หรือเพื่อความน่าเชื่อถือ</text>
</svg>
