  <text x="660" y="314" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">เพิ่มค่างาน 20%+</text>
  <rect x="30" y="350" width="740" height="35" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="400" y="372" font-family="system-ui,sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">ยิ่งรอนาน ยิ่งต้องคิดค่าบริการสูงขึ้น เพื่อชดเชย Cash Flow ที่เสียไป</text>
