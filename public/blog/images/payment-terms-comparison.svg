  <rect x="30" y="194" width="740" height="42" rx="4" fill="#1e293b" opacity="0.5"/>
  <text x="140" y="220" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">NET 15</text>
  <text x="310" y="220" font-family="system-ui,sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">ปานกลาง</text>
