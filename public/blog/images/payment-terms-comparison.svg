  <text x="660" y="220" font-family="system-ui,sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">โอเค</text>
  <rect x="30" y="241" width="740" height="42" rx="4" fill="#451a03" opacity="0.4"/>
  <text x="140" y="267" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">NET 30</text>
