  <text x="660" y="126" font-family="system-ui,sans-serif" font-size="13" fill="#34d399" text-anchor="middle">ดีที่สุด</text>
  <rect x="30" y="147" width="740" height="42" rx="4" fill="#1e3a5f" opacity="0.4"/>
