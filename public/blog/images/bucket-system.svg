<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Bucket System: แบ่งเงินอัตโนมัติสำหรับฟรีแลนซ์</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ตัวอย่าง: รายได้เดือนนี้ 50,000 บาท</text>
  <g transform="translate(40,75)">
    <rect x="0" y="0" width="220" height="280" rx="16" fill="#6366f1" opacity="0.06" stroke="#6366f1"/>
    <rect x="20" y="20" width="180" height="40" rx="8" fill="#6366f1" opacity="0.15"/>
    <text x="110" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#6366f1">50% = 25,000 ฿</text>
    <text x="110" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">ค่าใช้จ่ายจำเป็น</text>
    <text x="20" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่าเช่า/ผ่อนบ้าน</text>
    <text x="20" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่าอาหาร</text>
    <text x="20" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่าเดินทาง</text>
    <text x="20" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่าสาธารณูปโภค</text>
    <text x="20" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่าอินเทอร์เน็ต</text>
    <text x="20" y="240" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ค่า tools/software</text>
    <rect x="250" y="0" width="220" height="280" rx="16" fill="#10b981" opacity="0.06" stroke="#10b981"/>
    <rect x="270" y="20" width="180" height="40" rx="8" fill="#10b981" opacity="0.15"/>
    <text x="360" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#10b981">30% = 15,000 ฿</text>
    <text x="360" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">ออม + ภาษี + ลงทุน</text>
    <text x="270" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• Emergency Fund</text>
    <text x="270" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• กันเงินจ่ายภาษี</text>
    <text x="270" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• SSF/RMF</text>
    <text x="270" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ประกันสังคม ม.40</text>
    <text x="270" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• กองทุนรวม/ETF</text>
    <rect x="500" y="0" width="220" height="280" rx="16" fill="#f59e0b" opacity="0.06" stroke="#f59e0b"/>
    <rect x="520" y="20" width="180" height="40" rx="8" fill="#f59e0b" opacity="0.15"/>
    <text x="610" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">20% = 10,000 ฿</text>
    <text x="610" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">ใช้สนุก + พัฒนา</text>
    <text x="520" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ท่องเที่ยว</text>
    <text x="520" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• คอร์สเรียน/อบรม</text>
    <text x="520" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• อุปกรณ์ใหม่</text>
    <text x="520" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• งานอดิเรก</text>
    <text x="520" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">• ของขวัญ/สังสรรค์</text>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">* ปรับสัดส่วนได้ตามสถานการณ์ เดือนที่ได้เยอะอาจเพิ่มสัดส่วนออมเป็น 40%</text>
</svg>