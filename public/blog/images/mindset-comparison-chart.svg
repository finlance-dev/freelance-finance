<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">Mindset พนักงาน vs ฟรีแลนซ์</text>
  <text x="215" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="700">❌ พนักงาน</text>
  <text x="400" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="700">หัวข้อ</text>
  <text x="585" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="700">✅ ฟรีแลนซ์</text>
  <line x1="40" y1="75" x2="760" y2="75" stroke="#334155" stroke-width="1"/>
  <text x="215" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"ฉันทำตามที่สั่ง"</text>
  <text x="400" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">การตัดสินใจ</text>
  <text x="585" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"ฉันคิดเองทำเอง"</text>
  <text x="215" y="145" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"เงินเดือนเท่านี้ทุกเดือน"</text>
  <text x="400" y="145" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">รายได้</text>
  <text x="585" y="145" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"รายได้ไม่มีเพดาน"</text>
  <text x="215" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"บริษัทรับความเสี่ยง"</text>
  <text x="400" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">ความเสี่ยง</text>
  <text x="585" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"ฉันรับผิดชอบทุกอย่าง"</text>
  <text x="215" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"ขายเวลาแลกเงิน"</text>
  <text x="400" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">มูลค่า</text>
  <text x="585" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"ขายคุณค่าแลกเงิน"</text>
  <text x="215" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"แข่งขันกับเพื่อนร่วมงาน"</text>
  <text x="400" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">ความสัมพันธ์</text>
  <text x="585" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"Collaborate กับคนอื่น"</text>
  <text x="215" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"กลัวถูกไล่ออก"</text>
  <text x="400" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">ความกลัว</text>
  <text x="585" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">"กลัวไม่มีงาน"</text>
  <rect x="40" y="330" width="720" height="50" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">💡 ก่อนเป็นฟรีแลนซ์ ต้องเปลี่ยน mindset ให้พร้อมรับความไม่แน่นอนก่อน</text>
</svg>