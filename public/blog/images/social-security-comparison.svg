<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">เปรียบเทียบประกันสังคม มาตรา 39 vs 40</text>
  <g transform="translate(20,50)">
    <rect x="0" y="0" width="760" height="35" rx="6" fill="#6366f1" opacity="0.1"/>
    <text x="100" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#6366f1">หัวข้อ</text>
    <text x="310" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#6366f1">มาตรา 39</text>
    <text x="570" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#6366f1">มาตรา 40</text>
    <rect x="0" y="42" width="760" height="40" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="100" y="67" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">คุณสมบัติ</text>
    <text x="310" y="67" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">เคยเป็น ม.33 มาก่อน</text>
    <text x="570" y="67" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">สมัครได้เลย ไม่ต้องเคยเป็นลูกจ้าง</text>
    <rect x="0" y="88" width="760" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="100" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">เงินสมทบ</text>
    <text x="310" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">432 บาท/เดือน</text>
    <text x="570" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">100 / 150 / 300 บาท/เดือน</text>
    <rect x="0" y="134" width="760" height="40" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="100" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">สิทธิประโยชน์</text>
    <text x="310" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#10b981">6 กรณี (ครบ)</text>
    <text x="570" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b">3-5 กรณี (ตามทางเลือก)</text>
    <rect x="0" y="180" width="760" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="100" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่ารักษาพยาบาล</text>
    <text x="310" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#10b981">✓</text>
    <text x="570" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#10b981">✓ (ทุกทางเลือก)</text>
    <rect x="0" y="226" width="760" height="40" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="100" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ชราภาพ</text>
    <text x="310" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#10b981">✓ (บำนาญ)</text>
    <text x="570" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b">✓ ทางเลือก 2,3</text>
    <rect x="0" y="272" width="760" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="100" y="297" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ว่างงาน</text>
    <text x="310" y="297" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#ef4444">✗</text>
    <text x="570" y="297" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#ef4444">✗</text>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">* ข้อมูล ณ ปี 2026 อัตราสมทบอาจเปลี่ยนแปลง</text>
</svg>