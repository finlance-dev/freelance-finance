<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">5 ขั้นตอนขึ้นราคาอย่างมืออาชีพ</text>
  <rect x="30" y="50" width="740" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="72" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4338ca">1. เตรียมข้อมูล</text>
  <text x="60" y="95" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">รวบรวมผลงาน ผลลัพธ์ ROI ที่ลูกค้าได้ + เทียบราคาตลาด</text>
  <rect x="30" y="120" width="740" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="142" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4338ca">2. แจ้งล่วงหน้า 30 วัน</text>
  <text x="60" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">"ตั้งแต่เดือนหน้า ราคา package จะปรับขึ้น เนื่องจาก scope งานที่เพิ่มขึ้น"</text>
  <rect x="30" y="190" width="740" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="212" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4338ca">3. เสนอ value เพิ่ม</text>
  <text x="60" y="235" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">"ราคาใหม่จะรวม revision 3 ครั้ง + report สรุปผลรายเดือน"</text>
  <rect x="30" y="260" width="740" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="282" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4338ca">4. ให้ทางเลือก</text>
  <text x="60" y="305" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Package A: ราคาเดิม scope ลด / Package B: ราคาใหม่ scope เต็ม / Package C: Premium</text>
  <rect x="30" y="330" width="740" height="50" rx="10" fill="#4338ca"/>
  <text x="60" y="355" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="white">5. ยืนยันเป็นลายลักษณ์อักษร</text>
  <text x="60" y="373" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.8">ส่ง email/สัญญาใหม่ ระบุราคา + scope + วันที่เริ่มใช้ราคาใหม่ชัดเจน</text>
</svg>