<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#f8fafc">Digital Nomad: ต้องเสียภาษีที่ไหน?</text>
  <g font-family="system-ui,sans-serif">
    <rect x="250" y="45" width="300" height="40" rx="8" fill="#60a5fa"/>
    <text x="400" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="white">อยู่ในไทย ≥ 180 วัน/ปี?</text>
    <line x1="300" y1="85" x2="300" y2="120" stroke="#60a5fa" stroke-width="2"/>
    <line x1="500" y1="85" x2="500" y2="120" stroke="#60a5fa" stroke-width="2"/>
    <text x="270" y="110" font-size="11" fill="#34d399">ใช่</text>
    <text x="520" y="110" font-size="11" fill="#ef4444">ไม่</text>
    <rect x="150" y="120" width="300" height="35" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="300" y="143" text-anchor="middle" font-size="12" fill="#f59e0b">ผู้มีถิ่นที่อยู่ในไทย</text>
    <rect x="500" y="120" width="250" height="35" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="625" y="143" text-anchor="middle" font-size="12" fill="#34d399">ไม่ต้องเสียภาษีไทย*</text>
    <line x1="300" y1="155" x2="300" y2="180" stroke="#f59e0b" stroke-width="2"/>
    <rect x="100" y="180" width="400" height="35" rx="6" fill="#60a5fa" opacity="0.2"/>
    <text x="300" y="203" text-anchor="middle" font-size="12" fill="#60a5fa">นำเงินเข้าไทยในปีเดียวกัน?</text>
    <line x1="200" y1="215" x2="200" y2="245" stroke="#60a5fa" stroke-width="2"/>
    <line x1="400" y1="215" x2="400" y2="245" stroke="#60a5fa" stroke-width="2"/>
    <text x="170" y="235" font-size="11" fill="#34d399">ใช่</text>
    <text x="420" y="235" font-size="11" fill="#ef4444">ไม่</text>
    <rect x="50" y="245" width="300" height="40" rx="6" fill="#422006"/>
    <text x="200" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef4444">ต้องเสียภาษีไทย</text>
    <rect x="380" y="245" width="250" height="40" rx="6" fill="#064e3b"/>
    <text x="505" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">ยังไม่ต้อง (เก่า)</text>
    <rect x="50" y="300" width="700" height="70" rx="8" fill="#1e293b"/>
    <text x="400" y="325" text-anchor="middle" font-size="12" fill="#fbbf24" font-weight="bold">⚠ กฎใหม่ตั้งแต่ 1 ม.ค. 2567</text>
    <text x="400" y="350" text-anchor="middle" font-size="11" fill="#cbd5e1">รายได้ต่างประเทศที่นำเข้าไทย ไม่ว่าปีไหน ต้องเสียภาษีในปีที่นำเข้า</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">finlance.co | *ยังต้องเสียภาษีในประเทศที่มีถิ่นที่อยู่</text>
</svg>