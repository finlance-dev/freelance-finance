<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">เส้นทางประกันสังคม เมื่อลาออก</text>
  <rect x="300" y="55" width="200" height="50" rx="8" fill="#60a5fa" opacity="0.2" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="86" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="700">ม.33 (พนักงาน)</text>
  <line x1="400" y1="105" x2="400" y2="135" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">ลาออก ↓</text>
  <line x1="400" y1="145" x2="250" y2="175" stroke="#334155" stroke-width="2"/>
  <line x1="400" y1="145" x2="550" y2="175" stroke="#334155" stroke-width="2"/>
  <rect x="100" y="175" width="300" height="100" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="250" y="200" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="middle" font-weight="700">ม.39 (แนะนำ)</text>
  <text x="120" y="225" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">• 432 บาท/เดือน</text>
  <text x="120" y="245" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">• สิทธิ์ OPD IPD คลอดบุตร บำนาญ</text>
  <text x="120" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b">⚠ ต้องสมัครภายใน 6 เดือน!</text>
  <rect x="420" y="175" width="300" height="100" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="570" y="200" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="700">ม.40 (ทางเลือก)</text>
  <text x="440" y="225" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">• 70/100/300 บาท/เดือน</text>
  <text x="440" y="245" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">• ชดเชยรายวัน ชราภาพ</text>
  <text x="440" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">• สมัครได้ทุกเวลา</text>
  <rect x="40" y="300" width="720" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="600">⚡ สิ่งที่ต้องทำทันทีหลังลาออก</text>
  <text x="60" y="360" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">1. สมัคร ม.39 ภายใน 6 เดือน → 2. ซื้อประกันสุขภาพเอกชนเสริม → 3. เริ่มวางแผนเกษียณเอง</text>
</svg>