<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">10 Red Flags จากลูกค้า ที่ฟรีแลนซ์ต้องระวัง</text>
  <rect x="30" y="50" width="360" height="320" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="50" y="80" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">1. ไม่ยอมทำสัญญา / ไม่มี scope ชัดเจน</text>
  <text x="50" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">2. ขอดูงานฟรีก่อนจ้าง (spec work)</text>
  <text x="50" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">3. "งานง่ายๆ ไม่น่าแพงขนาดนี้"</text>
  <text x="50" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">4. เปลี่ยน scope ตลอด ไม่จ่ายเพิ่ม</text>
  <text x="50" y="200" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">5. ติดต่อนอกเวลา ไม่เคารพ boundary</text>
  <text x="50" y="230" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">6. ประวัติจ่ายช้า / ไม่จ่าย</text>
  <text x="50" y="260" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">7. Micromanage ทุกรายละเอียด</text>
  <text x="50" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">8. "ทำให้เถอะ เดี๋ยวมีงานอีกเยอะ"</text>
  <text x="50" y="320" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">9. ต่อราคาแรงมากเกินเหตุ</text>
  <text x="50" y="350" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">10. ด่าฟรีแลนซ์คนก่อนหน้า</text>
  <rect x="410" y="50" width="360" height="320" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="590" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#16a34a">วิธีรับมือ</text>
  <text x="430" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ ส่งสัญญามาตรฐานก่อนเริ่มงาน</text>
  <text x="430" y="150" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ เก็บเงินมัดจำ 50% ล่วงหน้า</text>
  <text x="430" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ กำหนด revision ในสัญญา</text>
  <text x="430" y="220" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ ตั้งเวลาตอบแชท (เช่น 9-18 น.)</text>
  <text x="430" y="255" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ เช็ครีวิวจากฟรีแลนซ์คนอื่น</text>
  <text x="430" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ ปฏิเสธอย่างสุภาพ ถ้าไม่ใช่</text>
  <text x="430" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+ Trust your gut feeling</text>
</svg>