<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">ควร Outsource งานนี้ไหม? Decision Framework</text>
  <rect x="280" y="55" width="240" height="45" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6"/>
  <text x="400" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#2563eb">งานนี้เป็น Core Skill ไหม?</text>
  <line x1="330" y1="100" x2="200" y2="140" stroke="#334155" stroke-width="1.5"/>
  <line x1="470" y1="100" x2="600" y2="140" stroke="#334155" stroke-width="1.5"/>
  <text x="250" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#059669">ไม่ใช่</text>
  <text x="520" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#dc2626">ใช่</text>
  <rect x="80" y="140" width="240" height="45" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b"/>
  <text x="200" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#92400e">Hourly Rate คุณ > ค่าจ้าง?</text>
  <rect x="480" y="140" width="240" height="45" rx="8" fill="#dc2626" opacity="0.15" stroke="#dc2626"/>
  <text x="600" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#dc2626">ทำเอง + พัฒนาทักษะ</text>
  <line x1="130" y1="185" x2="130" y2="220" stroke="#334155" stroke-width="1.5"/>
  <line x1="270" y1="185" x2="270" y2="220" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="210" font-family="system-ui,sans-serif" font-size="10" fill="#059669">ใช่</text>
  <text x="280" y="210" font-family="system-ui,sans-serif" font-size="10" fill="#dc2626">ไม่</text>
  <rect x="30" y="220" width="200" height="40" rx="8" fill="#059669" opacity="0.2" stroke="#059669"/>
  <text x="130" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#059669">OUTSOURCE!</text>
  <rect x="170" y="220" width="200" height="40" rx="8" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
  <text x="270" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#92400e">ทำเองไปก่อน</text>
  <rect x="30" y="285" width="740" height="90" rx="10" fill="white" stroke="#e2e8f0"/>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#1e293b">งานที่ควร Outsource เป็นอันดับแรก</text>
  <text x="150" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">บัญชี/ภาษี</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">งาน Admin</text>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Social Media</text>
  <text x="650" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Data Entry</text>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">กฎ: ถ้า Hourly Rate คุณ 500 บาท แต่จ้างคนทำงานนี้ได้ 200 บาท = ควร outsource</text>
</svg>