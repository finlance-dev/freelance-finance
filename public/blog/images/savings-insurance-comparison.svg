<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">ประกันออม vs กองทุน vs ฝากประจำ</text>
  <text x="250" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">ประกันชีวิตแบบออม</text>
  <text x="475" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="600">กองทุนรวม</text>
  <text x="680" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">ฝากประจำ</text>
  <line x1="40" y1="75" x2="760" y2="75" stroke="#334155" stroke-width="1"/>
  <text x="60" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">ผลตอบแทน/ปี</text>
  <text x="250" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">2-3%</text>
  <text x="475" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">5-15%</text>
  <text x="680" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">1.5-2%</text>
  <text x="60" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">ความเสี่ยง</text>
  <text x="250" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ต่ำมาก</text>
  <text x="475" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">ต่ำ-สูง</text>
  <text x="680" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ต่ำมาก</text>
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">สภาพคล่อง</text>
  <text x="250" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ต่ำ (10-20 ปี)</text>
  <text x="475" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">สูง (ขายได้ T+2)</text>
  <text x="680" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">กลาง (3-36 เดือน)</text>
  <text x="60" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">ลดหย่อนภาษี</text>
  <text x="250" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ได้ สูงสุด 100K</text>
  <text x="475" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ได้ (SSF/RMF)</text>
  <text x="680" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ไม่ได้</text>
  <text x="60" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">คุ้มครองชีวิต</text>
  <text x="250" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">ได้</text>
  <text x="475" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ไม่ได้</text>
  <text x="680" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">ไม่ได้</text>
  <rect x="40" y="245" width="720" height="135" rx="8" fill="#1e293b"/>
  <text x="400" y="275" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="700">แนะนำสำหรับฟรีแลนซ์</text>
  <text x="60" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">อยากได้ลดหย่อนภาษี + คุ้มครองชีวิต → ประกันออม</text>
  <text x="60" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">อยากได้ผลตอบแทนสูง + สภาพคล่อง → กองทุนรวม</text>
  <text x="60" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">อยากได้ปลอดภัย 100% + ถอนได้ → ฝากประจำ</text>
  <text x="60" y="380" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">💡 คำตอบที่ดีที่สุด: ผสมทั้ง 3 ตามสัดส่วนที่เหมาะกับเป้าหมาย</text>
</svg>