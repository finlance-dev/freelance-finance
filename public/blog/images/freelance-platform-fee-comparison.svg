<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">รายได้จริงหลังหักค่าคอม (งาน 50,000 บาท)</text>
  <g font-family="system-ui,sans-serif">
    <g font-size="11" fill="#94a3b8">
      <text x="50" y="65">แพลตฟอร์ม</text>
      <text x="230" y="65" text-anchor="middle">ค่าคอม</text>
      <text x="370" y="65" text-anchor="middle">หัก</text>
      <text x="500" y="65" text-anchor="middle">ได้รับจริง</text>
      <text x="650" y="65" text-anchor="middle">จุดเด่น</text>
    </g>
    <line x1="30" y1="75" x2="770" y2="75" stroke="#334155"/>
    <g font-size="12" fill="#cbd5e1">
      <text x="50" y="110" fill="#34d399" font-weight="bold">Upwork</text>
      <text x="230" y="110" text-anchor="middle">10%</text>
      <text x="370" y="110" text-anchor="middle" fill="#ef4444">-5,000</text>
      <text x="500" y="110" text-anchor="middle">45,000</text>
      <text x="650" y="110" text-anchor="middle" font-size="10">งานเยอะ ลูกค้าต่างชาติ</text>
      <text x="50" y="155" fill="#60a5fa" font-weight="bold">Fiverr</text>
      <text x="230" y="155" text-anchor="middle">20%</text>
      <text x="370" y="155" text-anchor="middle" fill="#ef4444">-10,000</text>
      <text x="500" y="155" text-anchor="middle">40,000</text>
      <text x="650" y="155" text-anchor="middle" font-size="10">ลูกค้ามาหา ไม่ต้อง bid</text>
      <text x="50" y="200" fill="#f59e0b" font-weight="bold">Fastwork</text>
      <text x="230" y="200" text-anchor="middle">10-15%</text>
      <text x="370" y="200" text-anchor="middle" fill="#ef4444">-5,000 ถึง -7,500</text>
      <text x="500" y="200" text-anchor="middle">42,500-45,000</text>
      <text x="650" y="200" text-anchor="middle" font-size="10">ลูกค้าไทย จ่ายเป็นบาท</text>
      <text x="50" y="245" fill="#a78bfa" font-weight="bold">Toptal</text>
      <text x="230" y="245" text-anchor="middle" fill="#34d399">0%</text>
      <text x="370" y="245" text-anchor="middle" fill="#34d399">0</text>
      <text x="500" y="245" text-anchor="middle" fill="#34d399">50,000</text>
      <text x="650" y="245" text-anchor="middle" font-size="10">Rate สูง ไม่หักค่าคอม</text>
      <text x="50" y="290" fill="#f472b6" font-weight="bold">หาเอง</text>
      <text x="230" y="290" text-anchor="middle" fill="#34d399">0%</text>
      <text x="370" y="290" text-anchor="middle" fill="#34d399">0</text>
      <text x="500" y="290" text-anchor="middle" fill="#34d399">50,000</text>
      <text x="650" y="290" text-anchor="middle" font-size="10">กำไรเต็ม แต่ต้องหาลูกค้าเอง</text>
    </g>
    <rect x="30" y="320" width="740" height="40" rx="6" fill="#064e3b"/>
    <text x="400" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">เริ่มจากแพลตฟอร์ม → สร้าง portfolio → ค่อยๆ หาลูกค้าตรง</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>