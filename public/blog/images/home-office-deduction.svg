<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">ค่าใช้จ่าย Home Office ที่หักภาษีได้ vs ไม่ได้</text>
  <rect x="30" y="50" width="360" height="310" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="210" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#16a34a">หักได้ (หักตามจริง)</text>
  <text x="50" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าอินเทอร์เน็ต (ส่วนที่ใช้งาน 50-80%)</text>
  <text x="50" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าไฟฟ้า (สัดส่วนพื้นที่ทำงาน)</text>
  <text x="50" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าซอฟต์แวร์ ค่า subscription</text>
  <text x="50" y="200" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าคอมพิวเตอร์ (ค่าเสื่อม 3-5 ปี)</text>
  <text x="50" y="230" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าโทรศัพท์ (ส่วนที่ใช้งาน)</text>
  <text x="50" y="260" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าอุปกรณ์สำนักงาน (โต๊ะ เก้าอี้)</text>
  <text x="50" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าเดินทางไปพบลูกค้า</text>
  <text x="50" y="320" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าประกันวิชาชีพ (ถ้ามี)</text>
  <rect x="410" y="50" width="360" height="310" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="590" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#dc2626">หักไม่ได้</text>
  <text x="430" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าเช่าบ้าน/คอนโดทั้งหลัง</text>
  <text x="430" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าอาหาร ค่ากาแฟส่วนตัว</text>
  <text x="430" y="170" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าเสื้อผ้า (ไม่ใช่ชุดทำงาน)</text>
  <text x="430" y="200" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Netflix / Spotify ส่วนตัว</text>
  <text x="430" y="230" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าเดินทางส่วนตัว</text>
  <text x="430" y="260" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ของใช้ส่วนตัวในบ้าน</text>
  <rect x="30" y="370" width="740" height="25" rx="4" fill="#fffbeb"/>
  <text x="400" y="388" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#92400e">สำคัญ: ถ้าเลือกหักเหมา 60% ไม่ต้องเก็บใบเสร็จ แต่ถ้าหักตามจริง ต้องมีหลักฐานทุกรายการ</text>
</svg>