<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">แผนบริหารเงินช่วงสงกรานต์สำหรับฟรีแลนซ์</text>
  <rect x="30" y="55" width="230" height="150" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="145" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#dc2626">2 สัปดาห์ก่อนหยุด</text>
  <text x="45" y="105" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ส่งงานค้างให้เสร็จ</text>
  <text x="45" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• วางบิลลูกค้าที่ค้าง</text>
  <text x="45" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• แจ้งลูกค้าวันหยุด</text>
  <text x="45" y="165" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• เก็บเงินสำรองค่าใช้จ่าย</text>
  <text x="45" y="185" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ตั้งงบเที่ยว: _____ บาท</text>
  <rect x="285" y="55" width="230" height="150" rx="8" fill="#fef3c7" stroke="#fde68a"/>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#92400e">ช่วงหยุดสงกรานต์</text>
  <text x="300" y="105" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ใช้จ่ายตามงบที่ตั้งไว้</text>
  <text x="300" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ถ้ามีงานด่วน = ราคาพรีเมียม</text>
  <text x="300" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ใช้เวลาว่างวางแผนครึ่งปีหลัง</text>
  <text x="300" y="165" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• อ่านหนังสือ/เรียน online</text>
  <text x="300" y="185" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• พักผ่อนจริงๆ!</text>
  <rect x="540" y="55" width="230" height="150" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="655" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#166534">กลับมาทำงาน</text>
  <text x="555" y="105" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ติดตามงานที่ค้าง</text>
  <text x="555" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• follow up ลูกค้า</text>
  <text x="555" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• เสนองานใหม่</text>
  <text x="555" y="165" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• เริ่มงานตาม pipeline</text>
  <text x="555" y="185" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• ทบทวนงบ + รายได้</text>
  <rect x="30" y="225" width="740" height="145" rx="10" fill="white" stroke="#e2e8f0"/>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">คำนวณ: ต้องเก็บเงินล่วงหน้าเท่าไหร่?</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">เงินสำรอง = ค่าใช้จ่ายประจำ + งบเที่ยว + buffer 20%</text>
  <text x="200" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#0d9488">ตัวอย่าง: ค่าใช้จ่าย 30,000</text>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">+ งบเที่ยว 15,000 + buffer 9,000</text>
  <text x="600" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#0d9488">= ต้องเก็บ 54,000 บาท</text>
  <text x="600" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">เริ่มเก็บ 2-3 เดือนก่อนสงกรานต์</text>
</svg>