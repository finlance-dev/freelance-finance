  <rect x="420" y="70" width="320" height="280" rx="16" fill="#8b5cf6" opacity="0.05" stroke="#8b5cf6" stroke-width="2"/>
  <text x="580" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#8b5cf6">RMF</text>
  <text x="580" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Retirement Mutual Fund</text>
