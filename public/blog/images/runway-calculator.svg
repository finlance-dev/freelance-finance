<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="700">คำนวณ Financial Runway ก่อนลาออก</text>
  <rect x="40" y="55" width="340" height="160" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="80" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="700">ค่าใช้จ่ายต่อเดือน</text>
  <text x="60" y="108" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ค่าเช่า/ผ่อนบ้าน</text>
  <text x="340" y="108" font-family="system-ui, sans-serif" font-size="13" fill="#f8fafc" text-anchor="end">฿10,000</text>
  <text x="60" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ค่าอาหาร</text>
  <text x="340" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#f8fafc" text-anchor="end">฿6,000</text>
  <text x="60" y="152" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ค่าเดินทาง + อินเทอร์เน็ต</text>
  <text x="340" y="152" font-family="system-ui, sans-serif" font-size="13" fill="#f8fafc" text-anchor="end">฿3,000</text>
  <text x="60" y="174" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ประกัน + อื่นๆ</text>
  <text x="340" y="174" font-family="system-ui, sans-serif" font-size="13" fill="#f8fafc" text-anchor="end">฿3,000</text>
  <line x1="60" y1="185" x2="340" y2="185" stroke="#334155" stroke-width="1"/>
  <text x="60" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="700">รวม/เดือน</text>
  <text x="340" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" text-anchor="end" font-weight="700">฿22,000</text>
  <rect x="420" y="55" width="340" height="160" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="590" y="80" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="middle" font-weight="700">Runway ที่ต้องเตรียม</text>
  <text x="440" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ขั้นต่ำ (6 เดือน)</text>
  <text x="720" y="110" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="end" font-weight="700">฿132,000</text>
  <text x="440" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">แนะนำ (9 เดือน)</text>
  <text x="720" y="140" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" text-anchor="end" font-weight="700">฿198,000</text>
  <text x="440" y="170" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">ปลอดภัย (12 เดือน)</text>
  <text x="720" y="170" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="end" font-weight="700">฿264,000</text>
  <rect x="40" y="240" width="720" height="140" rx="8" fill="#1e293b"/>
  <text x="400" y="270" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="700">สูตรคำนวณง่ายๆ</text>
  <text x="400" y="310" font-family="system-ui, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="600">Runway = ค่าใช้จ่าย/เดือน × จำนวนเดือน</text>
  <text x="400" y="345" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">บวกเพิ่ม 20% สำหรับค่าใช้จ่ายไม่คาดคิด (อุปกรณ์, ซอฟต์แวร์, ค่าเดินทางหาลูกค้า)</text>
</svg>