<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="35" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">Scarcity vs Abundance Mindset</text>
  <rect x="30" y="55" width="360" height="315" rx="8" fill="#4c0519" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="84" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">Scarcity Mindset (ความขาดแคลน)</text>
  <text x="50" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• รับทุกงานกลัวไม่มีงาน</text>
  <text x="50" y="140" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ตั้งราคาต่ำกว่าตลาดเสมอ</text>
  <text x="50" y="165" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• เปรียบเทียบตัวเองกับคนอื่นตลอด</text>
  <text x="50" y="190" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• กลัวลงทุนในตัวเอง</text>
  <text x="50" y="215" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ไม่กล้าปฏิเสธลูกค้า</text>
  <text x="50" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• มองการแข่งขันเป็นศัตรู</text>
  <text x="50" y="265" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• เครียดเรื่องเงินตลอดเวลา</text>
  <text x="50" y="290" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ไม่มีเวลาพักผ่อน</text>
  <text x="210" y="340" font-family="system-ui,sans-serif" font-size="22" fill="#ef4444" text-anchor="middle">😰 วงจรที่ไม่เติบโต</text>
  <rect x="410" y="55" width="360" height="315" rx="8" fill="#064e3b" opacity="0.3" stroke="#34d399" stroke-width="1.5"/>
  <text x="590" y="84" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#34d399" text-anchor="middle">Abundance Mindset (ความมั่งคั่ง)</text>
  <text x="430" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• คัดเลือกงานที่ match ทักษะ</text>
  <text x="430" y="140" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ตั้งราคาตามคุณค่าที่ส่งมอบ</text>
  <text x="430" y="165" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• เรียนรู้จากคนอื่น ร่วมมือกัน</text>
  <text x="430" y="190" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ลงทุนพัฒนาทักษะสม่ำเสมอ</text>
  <text x="430" y="215" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• กล้าปฏิเสธงานที่ไม่ใช่</text>
  <text x="430" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• มองคู่แข่งเป็น ecosystem</text>
  <text x="430" y="265" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• วางแผนการเงินอย่างมีสติ</text>
  <text x="430" y="290" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• สร้างสมดุลชีวิต-งาน</text>
  <text x="590" y="340" font-family="system-ui,sans-serif" font-size="22" fill="#34d399" text-anchor="middle">🚀 วงจรที่เติบโต</text>
</svg>
