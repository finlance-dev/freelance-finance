<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">Decision Tree: เลือกโมเดลคิดเงินที่เหมาะกับคุณ</text>
  <g font-family="system-ui,sans-serif">
    <rect x="280" y="45" width="240" height="35" rx="8" fill="#60a5fa"/>
    <text x="400" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Scope ของงานชัดเจนไหม?</text>
    <line x1="340" y1="80" x2="200" y2="110" stroke="#34d399" stroke-width="2"/>
    <line x1="460" y1="80" x2="600" y2="110" stroke="#ef4444" stroke-width="2"/>
    <text x="250" y="100" font-size="10" fill="#34d399">ชัดเจน</text>
    <text x="520" y="100" font-size="10" fill="#ef4444">ไม่ชัด</text>

    <rect x="100" y="110" width="200" height="35" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="200" y="133" text-anchor="middle" font-size="11" fill="#a78bfa">มี revision กี่รอบ?</text>
    <line x1="160" y1="145" x2="100" y2="175" stroke="#34d399" stroke-width="2"/>
    <line x1="240" y1="145" x2="300" y2="175" stroke="#ef4444" stroke-width="2"/>
    <text x="110" y="165" font-size="9" fill="#34d399">≤ 3 รอบ</text>
    <text x="260" y="165" font-size="9" fill="#ef4444">&gt; 3 รอบ</text>

    <rect x="20" y="175" width="170" height="50" rx="8" fill="#a78bfa"/>
    <text x="105" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Fixed Rate</text>
    <text x="105" y="215" text-anchor="middle" font-size="9" fill="#2e1065">เหมาโปรเจกต์ได้เลย</text>

    <rect x="220" y="175" width="170" height="50" rx="8" fill="#f97316"/>
    <text x="305" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Fixed + Buffer</text>
    <text x="305" y="215" text-anchor="middle" font-size="9" fill="#431407">เหมา + เผื่อ 20-30%</text>

    <rect x="500" y="110" width="200" height="35" rx="8" fill="#1e293b" stroke="#f97316"/>
    <text x="600" y="133" text-anchor="middle" font-size="11" fill="#f97316">งานต่อเนื่องไหม?</text>
    <line x1="560" y1="145" x2="500" y2="175" stroke="#34d399" stroke-width="2"/>
    <line x1="640" y1="145" x2="700" y2="175" stroke="#ef4444" stroke-width="2"/>
    <text x="510" y="165" font-size="9" fill="#34d399">ต่อเนื่อง</text>
    <text x="680" y="165" font-size="9" fill="#ef4444">ครั้งเดียว</text>

    <rect x="420" y="175" width="170" height="50" rx="8" fill="#f97316"/>
    <text x="505" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Hourly/Retainer</text>
    <text x="505" y="215" text-anchor="middle" font-size="9" fill="#431407">รายชั่วโมง + สัญญารายเดือน</text>

    <rect x="620" y="175" width="170" height="50" rx="8" fill="#ec4899"/>
    <text x="705" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Hourly + Cap</text>
    <text x="705" y="215" text-anchor="middle" font-size="9" fill="#500724">รายชั่วโมง + เพดานราคา</text>

    <rect x="30" y="260" width="740" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="400" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#f8fafc">สูตรคำนวณราคา</text>
    <text x="50" y="310" font-size="11" fill="#a78bfa">Fixed Rate = (ชั่วโมงประเมิน × Rate/ชม.) × 1.3 (buffer)</text>
    <text x="50" y="332" font-size="11" fill="#f97316">Hourly Rate = ต้นทุนต่อเดือน ÷ ชั่วโมงทำงาน × 1.5 (margin)</text>
    <text x="50" y="354" font-size="11" fill="#ec4899">Retainer = Hourly Rate × ชั่วโมง/เดือน × 0.85 (ส่วนลดสัญญายาว)</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">finlance.co</text>
</svg>