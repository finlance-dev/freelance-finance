  <rect x="30" y="345" width="740" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#059669">Specialize ในสายเฉพาะ = ค่าแปลสูงขึ้น 3-10 เท่าจากแปลทั่วไป</text>
