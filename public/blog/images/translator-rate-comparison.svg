    <text x="140" y="75" text-anchor="end" font-size="11" fill="#64748b">ทั่วไป</text>
    <rect x="150" y="60" width="120" height="25" rx="4" fill="#94a3b8"/><text x="280" y="78" font-size="10" fill="#64748b">0.8-1.5</text>
