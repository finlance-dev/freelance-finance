    <rect x="150" y="100" width="250" height="25" rx="4" fill="#60a5fa"/><text x="410" y="118" font-size="10" fill="#64748b">2-5</text>
    <text x="140" y="155" text-anchor="end" font-size="11" fill="#64748b">การแพทย์</text>
    <rect x="150" y="140" width="300" height="25" rx="4" fill="#34d399"/><text x="460" y="158" font-size="10" fill="#64748b">3-6</text>
    <text x="140" y="195" text-anchor="end" font-size="11" fill="#64748b">กฎหมาย</text>
    <rect x="150" y="180" width="400" height="25" rx="4" fill="#f59e0b"/><text x="560" y="198" font-size="10" fill="#64748b">3-8</text>
    <text x="140" y="235" text-anchor="end" font-size="11" fill="#64748b">การเงิน</text>
    <rect x="150" y="220" width="350" height="25" rx="4" fill="#a78bfa"/><text x="510" y="238" font-size="10" fill="#64748b">3-7</text>
