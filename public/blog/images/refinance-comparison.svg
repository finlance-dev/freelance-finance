  <text x="430" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">จ่ายรวมทั้งหมด</text><text x="720" y="205" font-family="system-ui, sans-serif" font-size="16" fill="#f8fafc" text-anchor="end">฿828,000</text>
  <rect x="40" y="255" width="720" height="60" rx="8" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="1"/>
  <text x="400" y="292" font-family="system-ui, sans-serif" font-size="22" fill="#34d399" text-anchor="middle" font-weight="800">ประหยัด ฿72,000 ใน 5 ปี (฿3,000/เดือน)</text>
  <rect x="40" y="335" width="720" height="50" rx="6" fill="#1e293b"/>
  <text x="400" y="366" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">⚠ ต้องคำนวณค่าธรรมเนียม refinance ด้วย (ค่าประเมิน + ค่าจดจำนอง + ค่าปรับ)</text>
