  <text x="430" y="145" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ค่างวด/เดือน</text><text x="720" y="145" font-family="system-ui, sans-serif" font-size="16" fill="#f8fafc" text-anchor="end">฿12,000</text>
