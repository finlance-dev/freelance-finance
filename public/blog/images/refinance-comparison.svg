  <text x="60" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ดอกเบี้ย</text><text x="350" y="115" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" text-anchor="end" font-weight="700">7.5%</text>
  <text x="60" y="145" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ค่างวด/เดือน</text><text x="350" y="145" font-family="system-ui, sans-serif" font-size="16" fill="#f8fafc" text-anchor="end">฿15,000</text>
  <text x="60" y="175" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">ดอกเบี้ยรวม 5 ปี</text><text x="350" y="175" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" text-anchor="end" font-weight="700">฿180,000</text>
  <text x="60" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">จ่ายรวมทั้งหมด</text><text x="350" y="205" font-family="system-ui, sans-serif" font-size="16" fill="#f8fafc" text-anchor="end">฿900,000</text>
  <rect x="410" y="55" width="350" height="180" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
