  <rect x="30" y="310" width="740" height="65" rx="12" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-dasharray="6,4"/>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#6366f1">แนะนำ: เริ่มจาก Referral + LinkedIn + 1 Platform → ค่อยๆ ขยายช่องทาง</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">อย่าพึ่งช่องทางเดียว กระจายความเสี่ยง อย่างน้อย 3 ช่องทาง</text>
