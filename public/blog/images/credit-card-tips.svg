<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">5 เคล็ดลับใช้บัตรเครดิตให้ได้ประโยชน์สูงสุด</text>
  <rect x="30" y="55" width="740" height="60" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="60" y="78" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#c2410c">1. จ่ายค่า tools/software ผ่านบัตร Cashback</text>
  <text x="60" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Adobe CC, Figma, Hosting, Domain = เงินคืน 1-5% ทุกเดือนโดยไม่ต้องทำอะไรเพิ่ม</text>
  <rect x="30" y="125" width="740" height="60" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="60" y="148" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#c2410c">2. แยกบัตรธุรกิจ vs บัตรส่วนตัว</text>
  <text x="60" y="170" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ใช้บัตรใบหนึ่งเฉพาะค่าใช้จ่ายธุรกิจ Statement เป็นหลักฐานหักค่าใช้จ่ายได้</text>
  <rect x="30" y="195" width="740" height="60" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="60" y="218" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#c2410c">3. ตั้ง Auto-pay จ่ายเต็มจำนวนทุกเดือน</text>
  <text x="60" y="240" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">ห้ามจ่ายขั้นต่ำ! ดอกเบี้ยบัตรเครดิต 16-28% ต่อปี สูงกว่าผลตอบแทนการลงทุนทุกประเภท</text>
  <rect x="30" y="265" width="740" height="60" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="60" y="288" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#c2410c">4. สะสมแต้ม/ไมล์ แลกของที่ใช้จริง</text>
  <text x="60" y="310" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">เลือกบัตรที่แต้มไม่หมดอายุ แลกเป็น voucher ร้านค้าหรือตั๋วเครื่องบินคุ้มกว่าของแถม</text>
  <rect x="30" y="335" width="740" height="50" rx="10" fill="#c2410c"/>
  <text x="60" y="358" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="white">5. ใช้บัตรเป็น Cash Flow Buffer 30-45 วัน</text>
  <text x="60" y="376" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.85">จ่ายค่าใช้จ่ายต้นเดือน ได้เวลา 30-45 วันก่อนต้องจ่าย = Cash flow ดีขึ้น</text>
</svg>