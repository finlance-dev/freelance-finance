<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">ภาษีหัก ณ ที่จ่าย ทำงานอย่างไร</text>
  <g transform="translate(50,60)">
    <rect x="0" y="0" width="200" height="100" rx="14" fill="#6366f1" opacity="0.1" stroke="#6366f1"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#6366f1">ส่งงานให้ลูกค้า</text>
    <text x="100" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ค่าบริการ 50,000 บาท</text>
    <text x="100" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#6366f1">📄</text>
    <text x="230" y="50" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">→</text>
    <rect x="260" y="0" width="200" height="100" rx="14" fill="#ef4444" opacity="0.1" stroke="#ef4444"/>
    <text x="360" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#ef4444">ลูกค้าหักภาษี 3%</text>
    <text x="360" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">หัก = 1,500 บาท</text>
    <text x="360" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#ef4444">✂️</text>
    <text x="490" y="50" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">→</text>
    <rect x="520" y="0" width="180" height="100" rx="14" fill="#10b981" opacity="0.1" stroke="#10b981"/>
    <text x="610" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#10b981">รับเงินจริง</text>
    <text x="610" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">48,500 บาท</text>
    <text x="610" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#10b981">💰</text>
  </g>
  <line x1="100" y1="175" x2="100" y2="210" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="410" y1="175" x2="410" y2="210" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <g transform="translate(50,210)">
    <rect x="0" y="0" width="200" height="80" rx="14" fill="#f59e0b" opacity="0.1" stroke="#f59e0b"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">ลูกค้าออก 50 ทวิ</text>
    <text x="100" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">หนังสือรับรองหัก ณ ที่จ่าย</text>
    <text x="230" y="40" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">→</text>
    <rect x="260" y="0" width="200" height="80" rx="14" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6"/>
    <text x="360" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6">ลูกค้านำส่งสรรพากร</text>
    <text x="360" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">ภายในวันที่ 7 เดือนถัดไป</text>
  </g>
  <rect x="50" y="320" width="700" height="55" rx="14" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-dasharray="6,4"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#10b981">ตอนยื่นภาษีประจำปี → นำยอดหัก ณ ที่จ่ายทั้งหมด มาเครดิตหักจากภาษีที่ต้องจ่าย</text>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#10b981">ถ้าหักไว้มากกว่าภาษีจริง → ขอคืนภาษีได้!</text>
</svg>