<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Checklist สร้าง Personal Brand สำหรับฟรีแลนซ์</text>
  <rect x="30" y="50" width="360" height="320" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="210" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#7c3aed">Foundation</text>
  <text x="50" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ กำหนด Niche ที่ชัดเจน</text>
  <text x="50" y="135" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ เขียน Bio ที่น่าสนใจ (1-2 ประโยค)</text>
  <text x="50" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ ใช้รูปโปรไฟล์เดียวกันทุก platform</text>
  <text x="50" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ สร้าง Portfolio เว็บไซต์</text>
  <text x="50" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ เลือก 2-3 แพลตฟอร์มหลัก</text>
  <text x="210" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#7c3aed">Content Strategy</text>
  <text x="50" y="280" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ กำหนด Content Pillar 3-4 หัวข้อ</text>
  <text x="50" y="305" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ วางแผนโพสต์สัปดาห์ละ 3-5 ครั้ง</text>
  <text x="50" y="330" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ แชร์ผลงาน + เบื้องหลัง + ความรู้</text>
  <text x="50" y="355" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">☐ Engage กับคนอื่นในวงการ</text>
  <rect x="410" y="50" width="360" height="320" rx="10" fill="white" stroke="#e2e8f0"/>
  <text x="590" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e293b">แพลตฟอร์มที่แนะนำ</text>
  <rect x="430" y="100" width="320" height="45" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="450" y="120" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#2563eb">LinkedIn</text>
  <text x="450" y="137" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">B2B ลูกค้าองค์กร ราคาสูง</text>
  <rect x="430" y="155" width="320" height="45" rx="6" fill="#fefce8" stroke="#fef08a"/>
  <text x="450" y="175" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#a16207">Instagram</text>
  <text x="450" y="192" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">งาน Visual: Design, Photo, Fashion</text>
  <rect x="430" y="210" width="320" height="45" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="450" y="230" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#059669">Twitter/X</text>
  <text x="450" y="247" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">งาน Tech, Dev, Writing</text>
  <rect x="430" y="265" width="320" height="45" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="450" y="285" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#c2410c">Facebook Group</text>
  <text x="450" y="302" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">ลูกค้า SME ไทย ทุกสายงาน</text>
  <text x="590" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#7c3aed">เป้าหมาย: ลูกค้ามาหาเอง 50%+</text>
</svg>