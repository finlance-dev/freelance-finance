<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <text x="600" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">หักค่าใช้จ่ายจริง vs เหมา ฟรีแลนซ์เลือกแบบไหนดี?</text>
  <g transform="translate(60,80)">
    <rect width="520" height="490" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="520" height="50" rx="12" fill="#f59e0b"/><text x="260" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#0f172a">หักค่าใช้จ่ายเหมา</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="85" fill="#34d399">✓</text><text x="55" y="85">ง่าย ไม่ต้องเก็บเอกสาร</text>
      <text x="30" y="115" fill="#34d399">✓</text><text x="55" y="115">หักได้ 40(2) = 50% สูงสุด 100K</text>
      <text x="30" y="145" fill="#34d399">✓</text><text x="55" y="145">หักได้ 40(7)(8) = 60%</text>
      <text x="30" y="175" fill="#34d399">✓</text><text x="55" y="175">ไม่ต้องทำบัญชี</text>
      <text x="30" y="205" fill="#34d399">✓</text><text x="55" y="205">ลดความเสี่ยงถูกตรวจสอบ</text>
      <text x="30" y="250" fill="#ef4444">✗</text><text x="55" y="250">40(2) จำกัดแค่ 100,000 บาท</text>
      <text x="30" y="280" fill="#ef4444">✗</text><text x="55" y="280">ค่าใช้จ่ายจริงมากกว่าก็หักไม่ได้</text>
      <text x="30" y="310" fill="#ef4444">✗</text><text x="55" y="310">รายได้สูงเสียเปรียบ</text>
    </g>
    <rect x="30" y="370" width="460" height="60" rx="8" fill="#422006"/>
    <text x="260" y="397" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24">เหมาะกับ: ค่าใช้จ่ายจริงน้อย</text>
    <text x="260" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#fed7aa">ฟรีแลนซ์สายบริการ ไม่มีต้นทุนสูง</text>
  </g>
  <g transform="translate(620,80)">
    <rect width="520" height="490" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <rect width="520" height="50" rx="12" fill="#60a5fa"/><text x="260" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#0f172a">หักค่าใช้จ่ายตามจริง</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="85" fill="#34d399">✓</text><text x="55" y="85">หักได้ไม่จำกัดเพดาน</text>
      <text x="30" y="115" fill="#34d399">✓</text><text x="55" y="115">ค่าอุปกรณ์ ค่าเช่า ค่าเดินทาง</text>
      <text x="30" y="145" fill="#34d399">✓</text><text x="55" y="145">ค่าจ้าง subcontractor</text>
      <text x="30" y="175" fill="#34d399">✓</text><text x="55" y="175">ประหยัดภาษีมากกว่า (ถ้ามีต้นทุนสูง)</text>
      <text x="30" y="205" fill="#34d399">✓</text><text x="55" y="205">เหมาะกับรายได้สูง</text>
      <text x="30" y="250" fill="#ef4444">✗</text><text x="55" y="250">ต้องเก็บใบเสร็จทุกใบ</text>
      <text x="30" y="280" fill="#ef4444">✗</text><text x="55" y="280">ต้องทำบัญชีรายรับรายจ่าย</text>
      <text x="30" y="310" fill="#ef4444">✗</text><text x="55" y="310">เสี่ยงถูกสรรพากรตรวจ</text>
    </g>
    <rect x="30" y="370" width="460" height="60" rx="8" fill="#0c4a6e"/>
    <text x="260" y="397" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#7dd3fc">เหมาะกับ: ค่าใช้จ่ายจริงเยอะ</text>
    <text x="260" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#bae6fd">ฟรีแลนซ์ที่มีต้นทุนอุปกรณ์/จ้างงาน</text>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>