<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">เจาะลึกระบบ VAT สำหรับฟรีแลนซ์</text>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#94a3b8">เมื่อไหร่ต้องจด VAT อะไรเปลี่ยนบ้าง</text>
  <g transform="translate(80,150)">
    <rect width="480" height="400" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect width="480" height="50" rx="12" fill="#ef4444"/><text x="240" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="white">รายได้ &gt; 1.8 ล้าน/ปี</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="90" font-weight="bold" fill="#ef4444">ต้องจด VAT ภายใน 30 วัน!</text>
      <text x="30" y="125">• เก็บ VAT 7% จากลูกค้า</text>
      <text x="30" y="155">• ออกใบกำกับภาษี</text>
      <text x="30" y="185">• ยื่น ภ.พ.30 ทุกเดือน</text>
      <text x="30" y="215">• ทำรายงานภาษีซื้อ-ขาย</text>
      <text x="30" y="260" fill="#fbbf24">VAT ที่เก็บจากลูกค้า = ภาษีขาย</text>
      <text x="30" y="290" fill="#fbbf24">VAT ที่จ่ายตอนซื้อของ = ภาษีซื้อ</text>
      <text x="30" y="330" fill="#34d399">จ่ายสรรพากร = ภาษีขาย - ภาษีซื้อ</text>
    </g>
  </g>
  <g transform="translate(640,150)">
    <rect width="480" height="400" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <rect width="480" height="50" rx="12" fill="#34d399"/><text x="240" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#0f172a">รายได้ &lt; 1.8 ล้าน/ปี</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="90" font-weight="bold" fill="#34d399">ยังไม่ต้องจด VAT</text>
      <text x="30" y="125">• ไม่ต้องเก็บ VAT จากลูกค้า</text>
      <text x="30" y="155">• ออกใบเสร็จธรรมดาได้</text>
      <text x="30" y="185">• ไม่ต้องยื่น ภ.พ.30</text>
      <text x="30" y="215">• ไม่ต้องทำรายงานภาษีซื้อ-ขาย</text>
      <text x="30" y="260" fill="#fbbf24">แต่ถ้าอยากจดก็ได้</text>
      <text x="30" y="290" fill="#94a3b8">จด VAT สมัครใจ = ขอคืนภาษีซื้อได้</text>
      <text x="30" y="330" fill="#94a3b8">เหมาะกับคนที่มีค่าใช้จ่ายซื้อของเยอะ</text>
    </g>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>