<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#60a5fa"/>
  <text x="600" y="120" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="#60a5fa" text-anchor="middle">Solo → Agency</text>
  <text x="600" y="172" font-family="system-ui,sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle">จากฟรีแลนซ์คนเดียวสู่ Agency</text>
  <rect x="80" y="230" width="220" height="200" rx="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="190" y="275" font-family="system-ui,sans-serif" font-size="52" text-anchor="middle">👤</text>
  <text x="190" y="330" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">Solo</text>
  <text x="190" y="358" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Time = Money</text>
  <text x="190" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">รายได้มีเพดาน</text>
  <text x="190" y="402" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">ทำทุกอย่างคนเดียว</text>
  <text x="375" y="340" font-family="system-ui,sans-serif" font-size="48" fill="#f59e0b" text-anchor="middle">→</text>
  <rect x="450" y="230" width="300" height="200" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="275" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle">เมื่อไหร่ควรขยาย?</text>
  <text x="470" y="305" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• Waitlist ลูกค้ารอ 3+ เดือน</text>
  <text x="470" y="330" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• รายได้เกิน 200K/เดือน</text>
  <text x="470" y="355" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีงาน Repeat 60%+</text>
  <text x="470" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีระบบงานชัดเจน</text>
  <text x="470" y="405" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีเงินทุนสำรอง 6 เดือน</text>
  <text x="825" y="340" font-family="system-ui,sans-serif" font-size="48" fill="#34d399" text-anchor="middle">→</text>
  <rect x="900" y="230" width="220" height="200" rx="14" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="1010" y="275" font-family="system-ui,sans-serif" font-size="44" text-anchor="middle">🏢</text>
  <text x="1010" y="330" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">Agency</text>
  <text x="1010" y="358" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Leverage ทีม</text>
  <text x="1010" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">รายได้ไม่มีเพดาน</text>
  <text x="1010" y="402" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">สร้าง Value ได้มากกว่า</text>
  <text x="600" y="580" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">คู่มือการขยายธุรกิจฟรีแลนซ์อย่างมีแผน</text>
</svg>
