  <text x="600" y="120" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#34d399" text-anchor="middle">หมวดค่าใช้จ่ายธุรกิจ</text>
  <text x="600" y="172" font-family="system-ui,sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle">อะไรหักภาษีได้บ้าง?</text>
  <rect x="60" y="215" width="240" height="100" rx="12" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
