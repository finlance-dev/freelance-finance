  <text x="700" y="278" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Home Office, Coworking</text>
  <text x="700" y="298" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">หักตามสัดส่วน</text>
  <rect x="840" y="215" width="240" height="100" rx="12" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"/>
