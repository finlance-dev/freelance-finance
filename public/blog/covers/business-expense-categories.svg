  <text x="440" y="403" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Outsource, ผู้ช่วย</text>
  <text x="440" y="423" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">หักได้ 100%</text>
  <rect x="580" y="340" width="240" height="100" rx="12" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="700" y="380" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#60a5fa" text-anchor="middle">ค่าธรรมเนียม</text>
  <text x="700" y="403" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">บัญชี, วิชาชีพ, กฎหมาย</text>
  <text x="700" y="423" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">หักได้ 100%</text>
  <rect x="840" y="340" width="240" height="100" rx="12" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="960" y="380" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">ค่าสังสรรค์ลูกค้า</text>
  <text x="960" y="403" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">อาหาร, ของขวัญ</text>
  <text x="960" y="423" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">หักได้บางส่วน</text>
  <text x="600" y="590" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">เจาะลึกทุกหมวดค่าใช้จ่ายที่หักภาษีได้สำหรับฟรีแลนซ์</text>
