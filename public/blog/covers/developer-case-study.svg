    <text x="250" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24">Tech Stack ที่ทำเงิน 2026</text>
    <text x="250" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#fed7aa">React/Next.js • AI/ML Integration • Mobile App</text>
    <text x="250" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#fed7aa">Cloud/DevOps • Blockchain/Web3</text>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
