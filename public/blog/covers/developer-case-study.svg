      <text x="50" y="120">Retainer 3 ราย + โปรเจกต์ + ลูกค้าต่างชาติ</text>
      <rect x="30" y="150" width="440" height="60" rx="8" fill="#0f172a"/>
      <text x="50" y="175" fill="#34d399" font-weight="bold">ค่าใช้จ่าย</text>
