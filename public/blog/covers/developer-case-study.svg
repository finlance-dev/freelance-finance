    <rect x="180" y="385" width="330" height="20" rx="4" fill="#a78bfa"/>
    <text x="530" y="400" font-size="11" fill="#cbd5e1">150,000 บาท/เดือน</text>
  </g>
  <rect x="90" y="445" width="430" height="90" rx="8" fill="#064e3b"/>
  <text x="305" y="480" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#34d399">กุญแจสำคัญ</text>
  <text x="305" y="510" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a7f3d0">Specialize + Retainer + Foreign Clients</text>
  <g transform="translate(640, 60)">
    <rect width="500" height="510" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="250" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">แผนการเงิน Developer</text>
    <g font-family="system-ui,sans-serif" font-size="12" fill="#cbd5e1">
      <rect x="30" y="75" width="440" height="60" rx="8" fill="#0f172a"/>
