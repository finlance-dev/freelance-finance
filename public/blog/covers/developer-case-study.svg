    <rect x="180" y="320" width="280" height="20" rx="4" fill="#f59e0b"/>
    <text x="480" y="335" font-size="11" fill="#cbd5e1">100,000 บาท/เดือน</text>
    <rect x="90" y="370" width="430" height="55" rx="8" fill="#0f172a"/>
