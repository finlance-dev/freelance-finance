<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#f59e0b"/>
  <text x="600" y="120" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#f59e0b" text-anchor="middle">ขึ้นราคาฟรีแลนซ์</text>
  <text x="600" y="172" font-family="system-ui,sans-serif" font-size="26" fill="#e2e8f0" text-anchor="middle">โดยไม่เสียลูกค้า คู่มือปฏิบัติจริง</text>
  <rect x="100" y="230" width="440" height="260" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">ความกลัวที่พบบ่อย</text>
  <text x="130" y="308" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🔴 ลูกค้าจะหนีไปหาคนถูกกว่า</text>
  <text x="130" y="338" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🔴 ลูกค้าจะไม่พอใจ</text>
  <text x="130" y="368" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🔴 ยังไม่พร้อม/เก่งพอ</text>
  <text x="130" y="398" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🔴 ขึ้นแล้วงานจะน้อยลง</text>
  <text x="130" y="428" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🔴 รู้สึกผิดที่เก็บแพงขึ้น</text>
  <rect x="660" y="230" width="440" height="260" rx="16" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="880" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">ความจริงที่ต้องรู้</text>
  <text x="690" y="308" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🟢 ลูกค้าดีซื้อ "คุณค่า" ไม่ใช่ราคา</text>
  <text x="690" y="338" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🟢 แจ้งล่วงหน้า 30-60 วัน</text>
  <text x="690" y="368" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🟢 อธิบายเหตุผลอย่างมืออาชีพ</text>
  <text x="690" y="398" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🟢 ลูกค้าไม่ดีจะหายไปเอง</text>
  <text x="690" y="428" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">🟢 รายได้รวมมักเพิ่มขึ้น</text>
  <text x="600" y="580" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">คู่มือขึ้นราคาฟรีแลนซ์อย่างมืออาชีพ</text>
</svg>
