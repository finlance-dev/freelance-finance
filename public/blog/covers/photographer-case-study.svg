<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <rect x="60" y="60" width="1080" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f59e0b">Case Study: Photographer ฟรีแลนซ์</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">บริหารรายได้ไม่สม่ำเสมอ จากถ่ายงานวันละ 3K สู่โปรเจกต์ละ 50K+</text>
  <g transform="translate(60, 200)">
