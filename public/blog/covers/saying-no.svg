<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#ef4444"/>
  <text x="600" y="130" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#ef4444" text-anchor="middle">กล้าพูด "NO"</text>
  <text x="600" y="185" font-family="system-ui,sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle">ทำไมการปฏิเสธลูกค้าช่วยให้รวยขึ้น</text>
  <circle cx="350" cy="380" r="150" fill="#4c0519" opacity="0.4" stroke="#ef4444" stroke-width="2"/>
  <text x="350" y="355" font-family="system-ui,sans-serif" font-size="60" font-weight="900" fill="#ef4444" text-anchor="middle">NO</text>
  <text x="350" y="395" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ลูกค้าเจ้าปัญหา</text>
  <text x="350" y="420" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">งานราคาถูก</text>
  <text x="350" y="445" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Scope ไม่ชัด</text>
  <text x="600" y="390" font-family="system-ui,sans-serif" font-size="48" fill="#f59e0b" text-anchor="middle">→</text>
  <circle cx="850" cy="380" r="150" fill="#064e3b" opacity="0.4" stroke="#34d399" stroke-width="2"/>
  <text x="850" y="355" font-family="system-ui,sans-serif" font-size="60" font-weight="900" fill="#34d399" text-anchor="middle">YES</text>
  <text x="850" y="395" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ลูกค้าที่ใช่</text>
  <text x="850" y="420" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">งานราคาดี</text>
  <text x="850" y="445" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">รายได้เพิ่มขึ้น</text>
  <text x="600" y="590" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">เรียนรู้วิธีคัดกรองลูกค้าและพูดปฏิเสธอย่างมืออาชีพ</text>
</svg>
