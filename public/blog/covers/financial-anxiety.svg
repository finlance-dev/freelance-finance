  <text x="600" y="225" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">คู่มือสุขภาพจิตการเงินฟรีแลนซ์</text>
  <rect x="150" y="270" width="180" height="180" rx="90" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
  <text x="240" y="348" font-family="system-ui,sans-serif" font-size="50" text-anchor="middle">😰</text>
  <text x="240" y="415" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ความวิตกกังวล</text>
  <text x="500" y="365" font-family="system-ui,sans-serif" font-size="48" fill="#60a5fa" text-anchor="middle">→</text>
  <rect x="600" y="270" width="180" height="180" rx="90" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="690" y="348" font-family="system-ui,sans-serif" font-size="50" text-anchor="middle">🧘</text>
  <text x="690" y="415" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ความสงบ</text>
  <text x="900" y="290" font-family="system-ui,sans-serif" font-size="16" fill="#60a5fa">• วางแผนฉุกเฉิน</text>
  <text x="900" y="320" font-family="system-ui,sans-serif" font-size="16" fill="#60a5fa">• ติดตามรายรับรายจ่าย</text>
