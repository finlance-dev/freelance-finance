  <text x="900" y="410" font-family="system-ui,sans-serif" font-size="16" fill="#60a5fa">• หาชุมชนซัพพอร์ต</text>
  <text x="600" y="580" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">สุขภาพจิตการเงินที่ดีคือพื้นฐานความสำเร็จ</text>
