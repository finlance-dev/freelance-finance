<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#60a5fa"/>
  <text x="600" y="130" font-family="system-ui,sans-serif" font-size="50" font-weight="700" fill="#60a5fa" text-anchor="middle">Financial Anxiety</text>
