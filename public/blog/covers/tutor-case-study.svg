<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <rect x="60" y="60" width="1080" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f59e0b">Case Study: Tutor ฟรีแลนซ์</text>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">จากสอนชั่วโมงละ 300 สู่ Online Academy รายได้หลักแสน</text>
  <g transform="translate(60, 185)">
    <rect width="350" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="175" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#f59e0b">รายได้ตาม Level</text>
    <g font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1">
      <rect x="20" y="60" width="310" height="55" rx="6" fill="#0f172a"/>
      <text x="35" y="83">สอนตัวต่อตัว: 300-500/ชม.</text>
      <text x="35" y="103" fill="#94a3b8">จำกัดเวลา = จำกัดรายได้</text>
      <rect x="20" y="125" width="310" height="55" rx="6" fill="#0f172a"/>
      <text x="35" y="148">สอนกลุ่มเล็ก: 200-400/คน/ชม.</text>
      <text x="35" y="168" fill="#94a3b8">5-10 คน = 1,000-4,000/ชม.</text>
      <rect x="20" y="190" width="310" height="55" rx="6" fill="#0f172a"/>
      <text x="35" y="213">สอนกลุ่มใหญ่: 100-200/คน/ชม.</text>
      <text x="35" y="233" fill="#94a3b8">20-50 คน = 2,000-10,000/ชม.</text>
      <rect x="20" y="255" width="310" height="55" rx="6" fill="#0f172a"/>
      <text x="35" y="278">คอร์สออนไลน์: Passive Income</text>
      <text x="35" y="298" fill="#94a3b8">สร้างครั้งเดียว ขายไม่จำกัด</text>
    </g>
  </g>
  <g transform="translate(430, 185)">
    <rect width="350" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="175" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#34d399">วิชาที่ทำเงินสูง</text>
    <g font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1">
      <rect x="20" y="60" width="310" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="85">ภาษาอังกฤษ: 400-1,500/ชม.</text>
      <rect x="20" y="110" width="310" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="135">คณิตศาสตร์/วิทยาศาสตร์: 400-1,000/ชม.</text>
      <rect x="20" y="160" width="310" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="185">IELTS/TOEFL/SAT: 800-2,000/ชม.</text>
      <rect x="20" y="210" width="310" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="235">Coding/Programming: 500-1,500/ชม.</text>
      <rect x="20" y="260" width="310" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="285">ดนตรี/ศิลปะ: 400-1,200/ชม.</text>
    </g>
  </g>
  <g transform="translate(800, 185)">
    <rect width="340" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="170" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#60a5fa">การจัดการเงิน</text>
    <g font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1">
      <rect x="20" y="60" width="300" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="85">ค่าใช้จ่ายต่ำ (คอม+เน็ต)</text>
      <rect x="20" y="110" width="300" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="135">Margin สูง 85-95%</text>
      <rect x="20" y="160" width="300" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="185">รายได้ seasonal (ตามเทอม)</text>
      <rect x="20" y="210" width="300" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="235">ภาษี: 40(2) หักเหมา 50%</text>
      <rect x="20" y="260" width="300" height="40" rx="6" fill="#0f172a"/>
      <text x="35" y="285">เป้า: สร้างคอร์ส = Passive</text>
    </g>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>