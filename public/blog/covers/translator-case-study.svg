<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <rect x="60" y="60" width="1080" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Case Study: Translator ฟรีแลนซ์</text>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">จากแปลคำละ 1 บาทสู่ Localization Specialist หกหลัก</text>
  <g transform="translate(60, 185)">
    <rect width="520" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="260" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#0d9488">เส้นทางเติบโต</text>
    <g font-family="system-ui,sans-serif" font-size="12" fill="#cbd5e1">
      <rect x="20" y="60" width="480" height="65" rx="8" fill="#0f172a"/>
      <text x="40" y="85" fill="#94a3b8">Level 1: General Translator</text>
      <text x="40" y="110" fill="#0d9488">0.8-1.5 บาท/คำ → 20,000-35,000/เดือน</text>
      <rect x="20" y="135" width="480" height="65" rx="8" fill="#0f172a"/>
      <text x="40" y="160" fill="#94a3b8">Level 2: Specialized Translator</text>
      <text x="40" y="185" fill="#60a5fa">2-5 บาท/คำ → 50,000-80,000/เดือน</text>
      <rect x="20" y="210" width="480" height="65" rx="8" fill="#0f172a"/>
      <text x="40" y="235" fill="#94a3b8">Level 3: Localization Expert</text>
      <text x="40" y="260" fill="#f59e0b">5-10 บาท/คำ → 80,000-150,000/เดือน</text>
      <rect x="20" y="285" width="480" height="65" rx="8" fill="#0f172a"/>
      <text x="40" y="310" fill="#94a3b8">Level 4: Localization Consultant</text>
      <text x="40" y="335" fill="#a78bfa">Retainer 50K-100K/ลูกค้า/เดือน</text>
    </g>
  </g>
  <g transform="translate(610, 185)">
    <rect width="530" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="265" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">สายที่ทำเงินสูง</text>
    <g font-family="system-ui,sans-serif" font-size="12" fill="#cbd5e1">
      <rect x="20" y="60" width="490" height="50" rx="8" fill="#0f172a"/>
      <text x="40" y="90">Legal/กฎหมาย: 3-8 บาท/คำ (สัญญา, เอกสารศาล)</text>
      <rect x="20" y="120" width="490" height="50" rx="8" fill="#0f172a"/>
      <text x="40" y="150">Medical/การแพทย์: 3-6 บาท/คำ (วิจัย, ยา)</text>
      <rect x="20" y="180" width="490" height="50" rx="8" fill="#0f172a"/>
      <text x="40" y="210">Tech/IT: 2-5 บาท/คำ (Software, App, Game)</text>
      <rect x="20" y="240" width="490" height="50" rx="8" fill="#0f172a"/>
      <text x="40" y="270">Marketing/โฆษณา: 3-10 บาท/คำ (Transcreation)</text>
      <rect x="20" y="300" width="490" height="50" rx="8" fill="#0f172a"/>
      <text x="40" y="330">Finance/การเงิน: 3-7 บาท/คำ (รายงาน, Audit)</text>
    </g>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>