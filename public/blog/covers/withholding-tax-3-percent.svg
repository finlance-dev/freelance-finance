<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">เจาะลึกภาษีหัก ณ ที่จ่าย 3%</text>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#94a3b8">ทุกเรื่องที่ฟรีแลนซ์ต้องรู้เกี่ยวกับ WHT</text>
  <g transform="translate(100,160)">
    <rect width="1000" height="400" rx="12" fill="#1e293b"/>
    <g font-family="system-ui,sans-serif" fill="#cbd5e1">
      <text x="500" y="50" text-anchor="middle" font-size="20" font-weight="bold" fill="#f59e0b">รายได้ 100,000 บาท</text>
      <text x="500" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">ลูกค้าหักภาษี ณ ที่จ่าย 3%</text>
      <rect x="350" y="110" width="300" height="50" rx="8" fill="#ef4444" opacity="0.2"/>
      <text x="500" y="142" text-anchor="middle" font-size="18" font-weight="bold" fill="#ef4444">หัก 3,000 บาท</text>
      <text x="500" y="190" text-anchor="middle" font-size="16">รับเงินจริง: <tspan fill="#34d399" font-weight="bold">97,000 บาท</tspan></text>
      <line x1="100" y1="220" x2="900" y2="220" stroke="#334155"/>
      <text x="500" y="260" text-anchor="middle" font-size="16" fill="#60a5fa" font-weight="bold">3,000 บาทนี้ไม่ได้หายไป!</text>
      <text x="500" y="295" text-anchor="middle" font-size="14">เป็นการจ่ายภาษีล่วงหน้า นำไปหักจากภาษีตอนยื่น ภ.ง.ด.90</text>
      <text x="500" y="325" text-anchor="middle" font-size="14">ถ้าภาษีที่ต้องจ่ายจริง &lt; ที่ถูกหักไป → <tspan fill="#34d399">ขอคืนภาษีได้!</tspan></text>
      <text x="500" y="370" text-anchor="middle" font-size="13" fill="#94a3b8">หลักฐาน: หนังสือรับรองหัก ณ ที่จ่าย (50 ทวิ)</text>
    </g>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>