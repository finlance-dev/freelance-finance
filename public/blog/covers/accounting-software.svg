<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <text x="600" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">เปรียบเทียบซอฟต์แวร์บัญชีสำหรับฟรีแลนซ์ 2569</text>
  <g font-family="system-ui,sans-serif">
    <rect x="60" y="80" width="350" height="230" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="80" width="350" height="45" rx="12" fill="#34d399"/>
    <text x="235" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">FlowAccount</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="80" y="145">ราคา: 0-999 บาท/เดือน</text>
      <text x="80" y="170">ออก invoice, ใบเสร็จ, ใบกำกับภาษี</text>
      <text x="80" y="195">รายงานภาษี, งบกำไรขาดทุน</text>
      <text x="80" y="220">จุดเด่น: ออกแบบมาสำหรับ SME ไทย</text>
      <text x="80" y="245">เชื่อมต่อกับสรรพากร e-Filing</text>
      <text x="80" y="270" fill="#34d399" font-weight="bold">แนะนำ: ฟรีแลนซ์ที่จดบริษัท</text>
    </g>
    <rect x="430" y="80" width="350" height="230" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="430" y="80" width="350" height="45" rx="12" fill="#60a5fa"/>
    <text x="605" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">PEAK Account</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="450" y="145">ราคา: 0-1,500 บาท/เดือน</text>
      <text x="450" y="170">ระบบบัญชีครบวงจร</text>
      <text x="450" y="195">รองรับ VAT, WHT</text>
      <text x="450" y="220">จุดเด่น: ใช้งานง่าย UI สวย</text>
      <text x="450" y="245">มี plan ฟรีสำหรับเริ่มต้น</text>
      <text x="450" y="270" fill="#60a5fa" font-weight="bold">แนะนำ: ฟรีแลนซ์เริ่มต้น</text>
    </g>
    <rect x="800" y="80" width="350" height="230" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="800" y="80" width="350" height="45" rx="12" fill="#f59e0b"/>
    <text x="975" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">iTAX</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="820" y="145">ราคา: ฟรี - 590 บาท/ปี</text>
      <text x="820" y="170">คำนวณภาษี, วางแผนลดหย่อน</text>
      <text x="820" y="195">เช็คสถานะคืนภาษี</text>
      <text x="820" y="220">จุดเด่น: เน้นวางแผนภาษี</text>
      <text x="820" y="245">ใช้งานง่าย เหมาะกับบุคคลธรรมดา</text>
      <text x="820" y="270" fill="#f59e0b" font-weight="bold">แนะนำ: คำนวณภาษีบุคคลธรรมดา</text>
    </g>
    <rect x="60" y="330" width="350" height="230" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="330" width="350" height="45" rx="12" fill="#a78bfa"/>
    <text x="235" y="358" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Google Sheets</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="80" y="395">ราคา: ฟรี</text>
      <text x="80" y="420">ปรับแต่งได้ตามต้องการ</text>
      <text x="80" y="445">ไม่มีฟีเจอร์อัตโนมัติ</text>
      <text x="80" y="470">จุดเด่น: ฟรี ยืดหยุ่นสูง</text>
      <text x="80" y="495">แชร์กับนักบัญชีได้ง่าย</text>
      <text x="80" y="520" fill="#a78bfa" font-weight="bold">แนะนำ: ฟรีแลนซ์ที่งบน้อย</text>
    </g>
    <rect x="430" y="330" width="350" height="230" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="430" y="330" width="350" height="45" rx="12" fill="#ec4899"/>
    <text x="605" y="358" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Wave (ต่างประเทศ)</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="450" y="395">ราคา: ฟรี</text>
      <text x="450" y="420">Invoice, Receipt, Expense tracking</text>
      <text x="450" y="445">รายงานการเงินครบ</text>
      <text x="450" y="470">จุดเด่น: ฟรี 100% + ฟีเจอร์ครบ</text>
      <text x="450" y="495">ข้อเสีย: ไม่รองรับภาษาไทย</text>
      <text x="450" y="520" fill="#ec4899" font-weight="bold">แนะนำ: ฟรีแลนซ์ที่มีลูกค้าต่างชาติ</text>
    </g>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>