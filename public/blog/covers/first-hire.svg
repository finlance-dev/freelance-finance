<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#60a5fa"/>
  <text x="600" y="120" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#60a5fa" text-anchor="middle">จ้างคนแรก</text>
  <text x="600" y="172" font-family="system-ui,sans-serif" font-size="26" fill="#e2e8f0" text-anchor="middle">เมื่อไหร่ จ้างใคร จ้างยังไง</text>
  <rect x="80" y="230" width="300" height="240" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">เมื่อไหร่ควรจ้าง?</text>
  <text x="100" y="305" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• งานล้น รับไม่หมด</text>
  <text x="100" y="330" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีงาน Repeat สม่ำเสมอ</text>
  <text x="100" y="355" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• รายได้เกิน 150K/เดือน</text>
  <text x="100" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีงานที่ delegate ได้</text>
  <text x="100" y="405" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มีเงินสำรอง 6 เดือน</text>
  <text x="100" y="430" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• รู้สึก Burnout จริงๆ</text>
  <rect x="450" y="230" width="300" height="240" rx="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="600" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">จ้างใครก่อน?</text>
  <text x="470" y="305" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">1. VA (ผู้ช่วยออนไลน์)</text>
  <text x="470" y="330" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">2. งาน Admin/งานเอกสาร</text>
  <text x="470" y="355" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">3. งานที่ใช้เวลามากแต่ไม่ซับซ้อน</text>
  <text x="470" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">4. Specialist ที่คุณไม่ถนัด</text>
  <text x="470" y="405" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">5. Junior ที่คุณ Train ได้</text>
  <rect x="820" y="230" width="300" height="240" rx="14" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="970" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">จ้างยังไง?</text>
  <text x="840" y="305" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• Freelance ก่อน ประจำทีหลัง</text>
  <text x="840" y="330" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• ทดลองงาน 1-3 เดือน</text>
  <text x="840" y="355" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• มี SOP ชัดเจนก่อนจ้าง</text>
  <text x="840" y="380" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• ตั้งงบค่าจ้าง 20-30%</text>
  <text x="840" y="405" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">• หักภาษี ณ ที่จ่ายถ้าจ้างรายเดือน</text>
  <text x="600" y="580" font-family="system-ui,sans-serif" font-size="20" fill="#64748b" text-anchor="middle">คู่มือการจ้างงานครั้งแรกสำหรับฟรีแลนซ์</text>
</svg>
