<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <rect x="60" y="60" width="1080" height="510" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">วางแผนการเงินช่วงสงกรานต์</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">ฟรีแลนซ์รับมืองานหยุดยาวอย่างไร</text>
  <rect x="100" y="190" width="320" height="160" rx="10" fill="#dc2626" opacity="0.12" stroke="#dc2626"/>
  <text x="260" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f87171">ปัญหาที่เจอ</text>
  <text x="120" y="265" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ลูกค้าหยุดยาว งานชะงัก</text>
  <text x="120" y="290" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• รายได้หายไป 1-2 สัปดาห์</text>
  <text x="120" y="315" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ค่าใช้จ่ายเที่ยวเพิ่ม</text>
  <text x="120" y="340" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• กลับมาทำงานหาลูกค้าใหม่</text>
  <rect x="460" y="190" width="320" height="160" rx="10" fill="#059669" opacity="0.12" stroke="#059669"/>
  <text x="620" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#34d399">วิธีรับมือ</text>
  <text x="480" y="265" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• เก็บเงินล่วงหน้า 1 เดือน</text>
  <text x="480" y="290" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ส่งงานก่อนหยุด 1 สัปดาห์</text>
  <text x="480" y="315" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ตั้งงบเที่ยวล่วงหน้า</text>
  <text x="480" y="340" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• วาง pipeline งานหลังหยุด</text>
  <rect x="820" y="190" width="280" height="160" rx="10" fill="#f59e0b" opacity="0.12" stroke="#f59e0b"/>
  <text x="960" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#fbbf24">โอกาส</text>
  <text x="840" y="265" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• รับงานด่วนราคาพรีเมียม</text>
  <text x="840" y="290" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• ทำ content ล่วงหน้า</text>
  <text x="840" y="315" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• พัฒนาทักษะใหม่</text>
  <text x="840" y="340" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">• วางแผนครึ่งปีหลัง</text>
  <rect x="100" y="390" width="1000" height="140" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="600" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">Timeline วางแผน</text>
  <text x="250" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b">2 สัปดาห์ก่อน</text>
  <text x="250" y="495" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ส่งงานค้าง แจ้งลูกค้า</text>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#34d399">ช่วงหยุด</text>
  <text x="600" y="495" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">พักผ่อน + วางแผน</text>
  <text x="950" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#60a5fa">กลับมาทำงาน</text>
  <text x="950" y="495" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ติดตามงาน + หาลูกค้า</text>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="bold" fill="#f8fafc">การเงินช่วงสงกรานต์ | Finlance</text>
</svg>