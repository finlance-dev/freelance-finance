<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <text x="600" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">เปรียบเทียบ: บุคคลธรรมดา vs จดทะเบียนบริษัท</text>
  <g transform="translate(60, 80)">
    <rect width="520" height="490" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="520" height="50" rx="12" fill="#f59e0b"/>
    <text x="260" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#0f172a">บุคคลธรรมดา (ภ.ง.ด.90)</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="85" fill="#34d399">✓</text><text x="55" y="85">ไม่ต้องจดทะเบียน</text>
      <text x="30" y="115" fill="#34d399">✓</text><text x="55" y="115">ค่าใช้จ่ายบริหารต่ำ</text>
      <text x="30" y="145" fill="#34d399">✓</text><text x="55" y="145">หักค่าใช้จ่ายเหมา 60%</text>
      <text x="30" y="175" fill="#34d399">✓</text><text x="55" y="175">ยื่นภาษีปีละครั้ง</text>
      <text x="30" y="205" fill="#34d399">✓</text><text x="55" y="205">ไม่ต้องจ้างนักบัญชี</text>
      <text x="30" y="250" fill="#ef4444">✗</text><text x="55" y="250">อัตราภาษีสูงสุด 35%</text>
      <text x="30" y="280" fill="#ef4444">✗</text><text x="55" y="280">ไม่แยกทรัพย์สินบุคคล/ธุรกิจ</text>
      <text x="30" y="310" fill="#ef4444">✗</text><text x="55" y="310">ลูกค้าบางรายไม่จ้างบุคคลธรรมดา</text>
    </g>
    <rect x="30" y="350" width="460" height="70" rx="8" fill="#422006"/>
    <text x="260" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24">เหมาะกับ: รายได้ไม่เกิน 1.5 ล้าน/ปี</text>
    <text x="260" y="405" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#fed7aa">ภาษีจริงต่ำเพราะหักเหมา 60%</text>
  </g>
  <g transform="translate(620, 80)">
    <rect width="520" height="490" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <rect x="0" y="0" width="520" height="50" rx="12" fill="#60a5fa"/>
    <text x="260" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#0f172a">จดทะเบียนบริษัท (นิติบุคคล)</text>
    <g font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      <text x="30" y="85" fill="#34d399">✓</text><text x="55" y="85">ภาษีนิติบุคคล 20% (คงที่)</text>
      <text x="30" y="115" fill="#34d399">✓</text><text x="55" y="115">SME ได้สิทธิ์ภาษี 0-15%</text>
      <text x="30" y="145" fill="#34d399">✓</text><text x="55" y="145">แยกทรัพย์สินบุคคล/บริษัท</text>
      <text x="30" y="175" fill="#34d399">✓</text><text x="55" y="175">น่าเชื่อถือกับลูกค้ารายใหญ่</text>
      <text x="30" y="205" fill="#34d399">✓</text><text x="55" y="205">หักค่าใช้จ่ายได้หลากหลาย</text>
      <text x="30" y="250" fill="#ef4444">✗</text><text x="55" y="250">ค่าจดทะเบียน 10,000-20,000</text>
      <text x="30" y="280" fill="#ef4444">✗</text><text x="55" y="280">ต้องจ้างนักบัญชี 3,000-10,000/เดือน</text>
      <text x="30" y="310" fill="#ef4444">✗</text><text x="55" y="310">ยื่นภาษี ภ.ง.ด.50/51 + งบการเงิน</text>
    </g>
    <rect x="30" y="350" width="460" height="70" rx="8" fill="#0c4a6e"/>
    <text x="260" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#7dd3fc">เหมาะกับ: รายได้เกิน 1.5-2 ล้าน/ปี</text>
    <text x="260" y="405" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#bae6fd">ประหยัดภาษีได้มากกว่าบุคคลธรรมดา</text>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
</svg>