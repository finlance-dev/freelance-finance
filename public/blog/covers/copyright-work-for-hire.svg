<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#a78bfa"/>
  <circle cx="200" cy="315" r="180" fill="#1e1b4b" opacity="0.6"/>
  <circle cx="1000" cy="315" r="140" fill="#1e1b4b" opacity="0.6"/>
  <text x="600" y="180" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#a78bfa" text-anchor="middle">ลิขสิทธิ์ &amp; Work for Hire</text>
  <text x="600" y="250" font-family="system-ui,sans-serif" font-size="32" fill="#e2e8f0" text-anchor="middle">ฟรีแลนซ์เป็นเจ้าของผลงานจริงไหม?</text>
  <rect x="160" y="310" width="260" height="120" rx="16" fill="#7c3aed" opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="290" y="362" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#a78bfa" text-anchor="middle">ลิขสิทธิ์เดิม</text>
  <text x="290" y="390" font-family="system-ui,sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">ผู้สร้างสรรค์ = เจ้าของ</text>
  <text x="290" y="415" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">โดยกฎหมาย</text>
  <text x="600" y="380" font-family="system-ui,sans-serif" font-size="48" fill="#ef4444" text-anchor="middle">VS</text>
  <rect x="780" y="310" width="260" height="120" rx="16" fill="#7f1d1d" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="910" y="362" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ef4444" text-anchor="middle">Work for Hire</text>
  <text x="910" y="390" font-family="system-ui,sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">ลูกค้า = เจ้าของ</text>
  <text x="910" y="415" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ถ้ามีสัญญาระบุ</text>
  <text x="600" y="570" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">เจาะลึกทุกมิติของลิขสิทธิ์งานฟรีแลนซ์</text>
