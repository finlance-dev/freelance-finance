<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="16" fill="#0f172a"/>
  <rect x="60" y="60" width="1080" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ef4444">Case Study: YouTuber/Content Creator ฟรีแลนซ์</text>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">สร้างรายได้หลายช่องทางจากคอนเทนต์</text>
  <g transform="translate(60, 185)">
    <rect width="530" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="265" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#ef4444">รายได้ 5 ช่องทาง</text>
    <g font-family="system-ui,sans-serif">
      <rect x="20" y="60" width="490" height="50" rx="8" fill="#0f172a"/>
      <rect x="20" y="60" width="200" height="50" rx="8" fill="#ef4444" opacity="0.2"/>
      <text x="35" y="90" font-size="12" fill="#fca5a5" font-weight="bold">AdSense 40%</text>
      <text x="230" y="90" font-size="11" fill="#94a3b8">5,000-100,000+/เดือน (ตาม views)</text>
      <rect x="20" y="120" width="490" height="50" rx="8" fill="#0f172a"/>
      <rect x="20" y="120" width="150" height="50" rx="8" fill="#f59e0b" opacity="0.2"/>
      <text x="35" y="150" font-size="12" fill="#fbbf24" font-weight="bold">Sponsor 30%</text>
      <text x="230" y="150" font-size="11" fill="#94a3b8">10,000-200,000/วิดีโอ</text>
      <rect x="20" y="180" width="490" height="50" rx="8" fill="#0f172a"/>
      <rect x="20" y="180" width="100" height="50" rx="8" fill="#34d399" opacity="0.2"/>
      <text x="35" y="210" font-size="12" fill="#6ee7b7" font-weight="bold">Affiliate 15%</text>
      <text x="230" y="210" font-size="11" fill="#94a3b8">3,000-30,000/เดือน</text>
      <rect x="20" y="240" width="490" height="50" rx="8" fill="#0f172a"/>
      <rect x="20" y="240" width="50" height="50" rx="8" fill="#60a5fa" opacity="0.2"/>
      <text x="35" y="270" font-size="12" fill="#93c5fd" font-weight="bold">Course 10%</text>
      <text x="230" y="270" font-size="11" fill="#94a3b8">คอร์สออนไลน์ passive income</text>
      <rect x="20" y="300" width="490" height="50" rx="8" fill="#0f172a"/>
      <rect x="20" y="300" width="30" height="50" rx="8" fill="#a78bfa" opacity="0.2"/>
      <text x="35" y="330" font-size="12" fill="#c4b5fd" font-weight="bold">Merch 5%</text>
      <text x="230" y="330" font-size="11" fill="#94a3b8">สินค้า/ของที่ระลึก</text>
    </g>
  </g>
  <g transform="translate(620, 185)">
    <rect width="520" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="260" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">จัดการเงิน Creator</text>
    <g font-family="system-ui,sans-serif" font-size="12" fill="#cbd5e1">
      <rect x="20" y="60" width="480" height="55" rx="8" fill="#0f172a"/>
      <text x="40" y="85" fill="#ef4444" font-weight="bold">ค่าอุปกรณ์ถ่าย</text>
      <text x="40" y="105" font-size="11" fill="#94a3b8">กล้อง ไมค์ ไฟ Editing PC: กันงบ 15%/เดือน</text>
      <rect x="20" y="125" width="480" height="55" rx="8" fill="#0f172a"/>
      <text x="40" y="150" fill="#f59e0b" font-weight="bold">ภาษี Content Creator</text>
      <text x="40" y="170" font-size="11" fill="#94a3b8">AdSense = เงินได้ 40(8) / Sponsor = 40(2) หรือ 40(8)</text>
      <rect x="20" y="190" width="480" height="55" rx="8" fill="#0f172a"/>
      <text x="40" y="215" fill="#34d399" font-weight="bold">กลยุทธ์ออม</text>
      <text x="40" y="235" font-size="11" fill="#94a3b8">รายได้ไม่สม่ำเสมอ → ออม % ไม่ใช่จำนวนคงที่</text>
      <rect x="20" y="255" width="480" height="55" rx="8" fill="#0f172a"/>
      <text x="40" y="280" fill="#60a5fa" font-weight="bold">ลงทุนกลับในช่อง</text>
      <text x="40" y="300" font-size="11" fill="#94a3b8">อุปกรณ์ดีขึ้น = คอนเทนต์ดีขึ้น = รายได้มากขึ้น</text>
    </g>
    <rect x="20" y="325" width="480" height="45" rx="8" fill="#422006"/>
    <text x="260" y="353" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#fbbf24">เป้าหมาย: Passive Income > ค่าใช้จ่ายประจำ</text>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">finlance.co</text>
