  <text x="600" y="340" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">จ่ายใน 15 วัน</text>
  <rect x="500" y="370" width="200" height="70" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="600" y="408" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#60a5fa" text-anchor="middle">NET 30</text>
  <text x="600" y="430" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">จ่ายใน 30 วัน</text>
