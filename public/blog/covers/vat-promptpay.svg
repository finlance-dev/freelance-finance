<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="4" fill="#a78bfa"/>
  <circle cx="200" cy="450" r="200" fill="#a78bfa" opacity="0.04"/>
  <rect x="640" y="100" width="500" height="430" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="890" y="150" font-family="system-ui, sans-serif" font-size="20" fill="#a78bfa" font-weight="700" text-anchor="middle">ต้องเสีย VAT ไหม?</text>
  <rect x="660" y="170" width="460" height="100" rx="8" fill="#1a1f3a"/>
  <text x="890" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">รายได้รวมทุกช่องทาง</text>
  <text x="890" y="240" font-family="system-ui, sans-serif" font-size="24" fill="#f59e0b" font-weight="700" text-anchor="middle">เกิน 1.8 ล้านบาท/ปี?</text>
  <text x="760" y="305" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">ไม่เกิน</text>
  <text x="1020" y="305" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle">เกิน</text>
  <rect x="660" y="320" width="200" height="80" rx="8" fill="#14532d"/>
  <text x="760" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#34d399" text-anchor="middle" font-weight="600">ไม่ต้องจด VAT</text>
  <text x="760" y="385" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">แม้รับผ่าน PromptPay</text>
  <rect x="880" y="320" width="200" height="80" rx="8" fill="#450a0a"/>
  <text x="980" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle" font-weight="600">ต้องจด VAT</text>
  <text x="980" y="385" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">ทุกช่องทางรวมกัน</text>
  <rect x="660" y="430" width="460" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="890" y="465" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">กฎใหม่ 2569: PromptPay ไม่ได้</text>
  <text x="890" y="490" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">หมายความว่าต้องเสีย VAT เสมอไป</text>
  <text x="80" y="120" font-family="system-ui, sans-serif" font-size="38" fill="#f8fafc" font-weight="800">ฟรีแลนซ์ต้องจ่าย VAT</text>
  <text x="80" y="165" font-family="system-ui, sans-serif" font-size="38" fill="#a78bfa" font-weight="800">จาก PromptPay ไหม?</text>
  <text x="80" y="235" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">กฎใหม่ 2569 ที่ต้องรู้</text>
  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">เข้าใจง่าย ตัดสินใจถูก</text>
  <text x="80" y="560" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">finlance.co — คู่มือสำหรับฟรีแลนซ์ไทย</text>
</svg>
